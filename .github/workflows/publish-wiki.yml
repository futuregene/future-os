name: Publish Docs

# Publish the Chinese wiki (docs/wiki/zh/) to Aliyun OSS (docs/ prefix). Manual
# trigger only — run it from the Actions tab ("Run workflow") or with
# `gh workflow run publish-wiki.yml`.
#
# Only the Chinese pages are published; the English pages under docs/wiki/en/
# are not pushed to OSS.
#
# OSS publish uploads and updates the current Chinese pages. It deliberately
# does not delete objects that disappeared locally: the publishing credential
# has no DeleteObject permission.

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-wiki
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    # ossutil v2 auto-reads these OSS_* env vars (endpoint + credentials); the
    # Setup step derives OSS_REGION from the endpoint for SigV4.
    env:
      OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
      OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
      OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
      OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ─── Publish the Chinese wiki to Aliyun OSS ────────────────────────────
      # ossutil v2 is fetched directly from Aliyun's public CDN (no third-party
      # action). Auth is entirely via the OSS_* env vars set at the job level.
      - name: Setup ossutil
        run: bash scripts/setup-ossutil.sh

      # Upload/update the current Chinese pages. Old objects are retained until
      # they are removed through a separately authorized OSS maintenance task.
      - name: Publish docs/wiki/zh to OSS
        run: |
          set -euo pipefail
          echo "==> Syncing docs/wiki/zh/ → docs/"
          ossutil sync docs/wiki/zh/ "oss://$OSS_BUCKET/docs/" -f
          echo "==> Done."
