name: Build desktop apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            artifact_name: futureos-macos
            # macOS ships as a .dmg: it preserves the .app bundle (exec bit,
            # symlinks) that a raw upload-artifact zip would strip.
            bundle_path: gui/src-tauri/target/release/bundle/dmg/*.dmg
          - name: Windows
            os: windows-latest
            artifact_name: futureos-windows
            bundle_path: gui/src-tauri/target/release/bundle/**
          - name: Linux
            os: ubuntu-22.04
            artifact_name: futureos-linux
            bundle_path: gui/src-tauri/target/release/bundle/**

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            agent
            gui/src-tauri

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            protobuf-compiler \
            wget

      - name: Install macOS system dependencies
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install Windows system dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install protoc --yes

      - name: Install npm dependencies
        working-directory: gui
        run: npm ci

      # Build the agent and stage it as a Tauri sidecar so the packaged app
      # starts it automatically (see bundle.externalBin in tauri.conf.json).
      # The file must be named future-agent-<target-triple> for Tauri to pick it.
      - name: Build bundled agent (Unix)
        if: runner.os != 'Windows'
        run: |
          cargo build --release --manifest-path agent/Cargo.toml
          triple=$(rustc -Vv | sed -n 's/^host: //p')
          mkdir -p gui/src-tauri/binaries
          cp "agent/target/release/future-agent" "gui/src-tauri/binaries/future-agent-$triple"

      - name: Build bundled agent (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cargo build --release --manifest-path agent/Cargo.toml
          $triple = (rustc -Vv | Select-String '^host:').Line.Split(' ')[1]
          New-Item -ItemType Directory -Force -Path gui/src-tauri/binaries | Out-Null
          Copy-Item "agent/target/release/future-agent.exe" "gui/src-tauri/binaries/future-agent-$triple.exe"

      - name: Build desktop bundle
        working-directory: gui
        run: npm run tauri:build

      - name: Upload desktop bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          path: ${{ matrix.bundle_path }}
