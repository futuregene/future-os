name: Build desktop apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            artifact_name: futureos-macos
            # macOS ships as a .dmg: it preserves the .app bundle (exec bit,
            # symlinks) that a raw upload-artifact zip would strip.
            bundle_path: gui/src-tauri/target/release/bundle/dmg/*.dmg
          - name: Windows
            os: windows-latest
            artifact_name: futureos-windows
            # The MSI installer. Coexists with the portable zip (uploaded as
            # futureos-windows-portable below). Both bundle the agent sidecar.
            bundle_path: gui/src-tauri/target/release/bundle/msi/*.msi
          - name: Linux
            os: ubuntu-22.04
            artifact_name: futureos-linux
            bundle_path: gui/src-tauri/target/release/bundle/**

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            agent
            gui/src-tauri

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            protobuf-compiler \
            wget

      - name: Install macOS system dependencies
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install Windows system dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install protoc --yes

      - name: Install npm dependencies
        working-directory: gui
        run: npm ci

      # Build the agent and stage it as a Tauri sidecar so the packaged app
      # starts it automatically (see bundle.externalBin in tauri.conf.json).
      # The file must be named future-agent-<target-triple> for Tauri to pick it.
      - name: Build bundled agent (Unix)
        if: runner.os != 'Windows'
        run: |
          cargo build --release --manifest-path agent/Cargo.toml
          triple=$(rustc -Vv | sed -n 's/^host: //p')
          mkdir -p gui/src-tauri/binaries
          cp "agent/target/release/future-agent" "gui/src-tauri/binaries/future-agent-$triple"

      - name: Build bundled agent (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cargo build --release --manifest-path agent/Cargo.toml
          $triple = (rustc -Vv | Select-String '^host:').Line.Split(' ')[1]
          New-Item -ItemType Directory -Force -Path gui/src-tauri/binaries | Out-Null
          Copy-Item "agent/target/release/future-agent.exe" "gui/src-tauri/binaries/future-agent-$triple.exe"

      - name: Build desktop bundle
        working-directory: gui
        run: npm run tauri:build

      # The .app is unsigned/un-notarized, so ship first-launch (Gatekeeper)
      # instructions inside the dmg. Inject the file into Tauri's dmg by
      # round-tripping it through a read-write image.
      - name: Add first-launch guide to macOS dmg
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          src=$(ls gui/src-tauri/target/release/bundle/dmg/*.dmg | head -n1)
          work="$RUNNER_TEMP/rw.dmg"
          out="$RUNNER_TEMP/out.dmg"
          mnt="$RUNNER_TEMP/mnt"
          hdiutil convert "$src" -format UDRW -o "$work"
          hdiutil resize -size 200m "$work"
          mkdir -p "$mnt"
          hdiutil attach "$work" -mountpoint "$mnt" -nobrowse -noverify
          cp "docs/dist/macos-first-launch.txt" "$mnt/请先阅读-如何打开.txt"
          hdiutil detach "$mnt"
          hdiutil convert "$work" -format UDZO -o "$out"
          mv -f "$out" "$src"

      - name: Upload desktop bundle
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          path: ${{ matrix.bundle_path }}

      # Portable (install-free) Windows build: the main exe plus the agent
      # sidecar (renamed without the triple, as Tauri does on bundling, so
      # runtime sidecar resolution finds it next to the exe). Requires the
      # WebView2 Evergreen runtime, which ships with Windows 10/11.
      - name: Assemble Windows portable
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $triple = (rustc -Vv | Select-String '^host:').Line.Split(' ')[1]
          $dir = "futureos-portable"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          Copy-Item "gui/src-tauri/target/release/futureos.exe" "$dir/FutureOS.exe"
          Copy-Item "gui/src-tauri/binaries/future-agent-$triple.exe" "$dir/future-agent.exe"
          Copy-Item "docs/dist/windows-portable-README.txt" "$dir/使用说明.txt"
          Compress-Archive -Path "$dir/*" -DestinationPath "FutureOS-portable-windows.zip" -Force

      - name: Upload Windows portable
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: futureos-windows-portable
          if-no-files-found: error
          path: FutureOS-portable-windows.zip
