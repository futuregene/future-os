name: CI

permissions: read-all

# Fast feedback on every push to main, every PR, and on manual dispatch:
# lint + typecheck + tests + a 3-platform Rust compile check. Full
# cross-platform *packaging* stays in build.yml (tags / dispatch) — this
# workflow exists so breakage (especially platform-conditional Rust that only
# shows up on Windows/macOS) is caught BEFORE a release build is cut.
on:
  push:
    branches: [main]
  pull_request:
  # Lets you run the whole PR-check suite manually from the Actions tab
  # (e.g. to verify a cross-platform fix on a feature branch without a PR).
  workflow_dispatch:

# Re-pushing a branch cancels its stale run; release tags are unaffected
# (this workflow never triggers on tags anyway).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # On PRs, run only the suites affected by the changed paths. Pushes to main
  # and manual dispatches are deliberately full runs: the former validates the
  # merge result, and the latter is the escape hatch for dependency/runner
  # changes that do not show up in a source diff.
  changes:
    name: Detect affected checks
    runs-on: ubuntu-latest
    outputs:
      rust_workspace: ${{ steps.force.outputs.all == 'true' || steps.filter.outputs.rust_workspace == 'true' || steps.filter.outputs.ci == 'true' }}
      gui_tauri: ${{ steps.force.outputs.all == 'true' || steps.filter.outputs.gui_tauri == 'true' || steps.filter.outputs.ci == 'true' }}
      gui_frontend: ${{ steps.force.outputs.all == 'true' || steps.filter.outputs.gui_frontend == 'true' || steps.filter.outputs.ci == 'true' }}
      cli: ${{ steps.force.outputs.all == 'true' || steps.filter.outputs.cli == 'true' || steps.filter.outputs.ci == 'true' }}
      tui: ${{ steps.force.outputs.all == 'true' || steps.filter.outputs.tui == 'true' || steps.filter.outputs.ci == 'true' }}
    steps:
      - id: force
        shell: bash
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            echo "all=false" >> "$GITHUB_OUTPUT"
          else
            echo "all=true" >> "$GITHUB_OUTPUT"
          fi

      - id: filter
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            # Changing this workflow must revalidate every suite.
            ci:
              - '.github/workflows/ci.yml'
            rust_workspace:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.cargo/**'
              - 'rust-toolchain.toml'
              - 'proto/**'
              - 'agent/**'
              - 'channels/**'
              - 'remote/**'
            gui_tauri:
              - 'gui/src-tauri/**'
              - '.cargo/**'
              - 'rust-toolchain.toml'
            gui_frontend:
              - 'gui/**'
              - '!gui/src-tauri/**'
            cli:
              - 'cli/**'
            tui:
              - 'tui/**'

  # ─── Rust lint gate (Linux): fmt + clippy ─────────────────────────────────
  # Lint all workspace crates plus the GUI Tauri backend. Tests run in the
  # independent `rust-tests` job below so both gates can execute in parallel.
  rust-quality:
    name: Rust fmt + clippy (Linux)
    needs: changes
    if: needs.changes.outputs.rust_workspace == 'true' || needs.changes.outputs.gui_tauri == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Pinned to match rust-toolchain.toml so CI and local dev use the same
      # compiler. Bump both together (see build.yml for the same pin).
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.97.0

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            gui/src-tauri
          cache-on-failure: true
          cache-all-crates: true

      # protoc for the workspace build.rs proto codegen. mold + binutils
      # because .cargo/config.toml pins -fuse-ld=mold and clippy still
      # link build scripts, proc-macros and test binaries. WebKit/GTK for the
      # Tauri -sys build scripts (GUI backend is part of this gate now).
      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            binutils \
            mold \
            pkg-config \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            protobuf-compiler

      # tauri-build's build script aborts with `resource path ... doesn't exist`
      # unless every `bundle.externalBin` sidecar is present. For lint empty
      # placeholders suffice.
      - name: Create placeholder sidecars
        if: needs.changes.outputs.gui_tauri == 'true'
        run: |
          triple=$(rustc -Vv | sed -n 's/^host: //p')
          mkdir -p gui/src-tauri/binaries
          : > "gui/src-tauri/binaries/future-agent-$triple"
          : > "gui/src-tauri/binaries/future-$triple"

      # ── Workspace crates (agent / channels / remote) ──
      # --all because the root manifest is a virtual workspace (no [package]);
      # --manifest-path would fail with "Failed to find targets".
      - name: rustfmt (workspace)
        if: needs.changes.outputs.rust_workspace == 'true'
        run: cargo fmt --check --all

      - name: clippy (workspace)
        if: needs.changes.outputs.rust_workspace == 'true'
        run: cargo clippy --workspace --all-targets --manifest-path Cargo.toml -- -D warnings

      # ── GUI Tauri backend ──
      - name: rustfmt (GUI backend)
        if: needs.changes.outputs.gui_tauri == 'true'
        run: cargo fmt --check --manifest-path gui/src-tauri/Cargo.toml

      - name: clippy (GUI backend)
        if: needs.changes.outputs.gui_tauri == 'true'
        run: cargo clippy --all-targets --manifest-path gui/src-tauri/Cargo.toml -- -D warnings

  # ─── Rust test gate (Linux) ───────────────────────────────────────────────
  # This deliberately duplicates setup from `rust-quality`: separate jobs do
  # not share a live target directory, but running lint and tests in parallel
  # reduces PR wall-clock time.
  rust-tests:
    name: Rust tests (Linux)
    needs: changes
    if: needs.changes.outputs.rust_workspace == 'true' || needs.changes.outputs.gui_tauri == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.97.0

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            gui/src-tauri
          cache-on-failure: true
          cache-all-crates: true

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            binutils \
            mold \
            pkg-config \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            protobuf-compiler

      - name: Create placeholder sidecars
        if: needs.changes.outputs.gui_tauri == 'true'
        run: |
          triple=$(rustc -Vv | sed -n 's/^host: //p')
          mkdir -p gui/src-tauri/binaries
          : > "gui/src-tauri/binaries/future-agent-$triple"
          : > "gui/src-tauri/binaries/future-$triple"

      - name: cargo test (workspace)
        if: needs.changes.outputs.rust_workspace == 'true'
        run: cargo test --workspace --manifest-path Cargo.toml

      - name: cargo test (GUI backend)
        if: needs.changes.outputs.gui_tauri == 'true'
        run: cargo test --manifest-path gui/src-tauri/Cargo.toml

  # ─── Rust 3-platform compile check ───────────────────────────────────────
  # The quality gate above only runs on Linux, so platform-conditional code was
  # never type-checked on Windows/macOS — exactly how the GUI Tauri backend
  # regressed twice (a macOS-only fix dropped the `windows` crate and broke
  # Windows, and vice versa) with no PR signal. This matrix runs `cargo check`
  # on every release target so a missing `cfg`/crate surfaces on the PR.
  #
  # Scope: the whole workspace (agent / channels / remote) plus the GUI Tauri
  # backend. `cargo check` type-checks without linking the final crate, but it
  # DOES link build scripts / proc-macros, so each OS still needs its linker
  # story: Linux needs mold (`.cargo/config.toml`'s -fuse-ld=mold) and the
  # WebKit/GTK libs (the -sys build scripts run pkg-config); every OS needs
  # protoc for the workspace crates' build.rs (the GUI proto is checked in and
  # needs none). The GUI backend's `bundle.externalBin` sidecars don't exist in
  # a bare check, so we drop empty placeholders (tauri-build only checks
  # presence; `binaries/` is gitignored).
  rust-build:
    name: Rust build (${{ matrix.name }})
    needs: changes
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
          - name: Windows
            os: windows-latest
          - name: macOS
            os: macos-latest
    steps:
      # Keep the three matrix statuses present for branch protection. A
      # job-level `if` would skip matrix expansion entirely, leaving the
      # required per-platform checks as "Expected" on unrelated PRs.
      - name: No Rust or GUI Tauri changes
        if: needs.changes.outputs.rust_workspace != 'true' && needs.changes.outputs.gui_tauri != 'true'
        run: echo "No Rust workspace or GUI Tauri changes; build check skipped."

      - name: Checkout
        if: needs.changes.outputs.rust_workspace == 'true' || needs.changes.outputs.gui_tauri == 'true'
        uses: actions/checkout@v5

      - name: Setup Rust
        if: needs.changes.outputs.rust_workspace == 'true' || needs.changes.outputs.gui_tauri == 'true'
        uses: dtolnay/rust-toolchain@1.97.0

      - name: Cache Rust
        if: needs.changes.outputs.rust_workspace == 'true' || needs.changes.outputs.gui_tauri == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            gui/src-tauri
          cache-on-failure: true
          cache-all-crates: true

      - name: Install Linux system dependencies
        if: (needs.changes.outputs.rust_workspace == 'true' || needs.changes.outputs.gui_tauri == 'true') && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            binutils \
            mold \
            pkg-config \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            protobuf-compiler

      - name: Install macOS protoc
        if: needs.changes.outputs.rust_workspace == 'true' && runner.os == 'macOS'
        run: brew install protobuf

      # taiki-e/install-action is a composite action (no Node runtime /
      # deprecation warning); choco was unreliable at exposing protoc on PATH.
      - name: Install Windows protoc
        if: needs.changes.outputs.rust_workspace == 'true' && runner.os == 'Windows'
        uses: taiki-e/install-action@v2
        with:
          tool: protoc

      # tauri-build's build script aborts with `resource path ... doesn't exist`
      # unless every `bundle.externalBin` sidecar is present (host triple
      # appended, `.exe` on Windows). The packaging jobs build+copy the real
      # ones; for a type-check empty placeholders suffice. Split per-OS so
      # Windows uses pwsh natively instead of relying on git-bash's sed/case.
      - name: Create placeholder sidecars (Unix)
        if: runner.os != 'Windows' && needs.changes.outputs.gui_tauri == 'true'
        run: |
          triple=$(rustc -Vv | sed -n 's/^host: //p')
          mkdir -p gui/src-tauri/binaries
          : > "gui/src-tauri/binaries/future-agent-$triple"
          : > "gui/src-tauri/binaries/future-$triple"

      - name: Create placeholder sidecars (Windows)
        if: runner.os == 'Windows' && needs.changes.outputs.gui_tauri == 'true'
        shell: pwsh
        run: |
          $triple = (rustc -Vv | Select-String '^host:').Line.Split(' ')[1]
          New-Item -ItemType Directory -Force -Path gui/src-tauri/binaries | Out-Null
          New-Item -ItemType File -Force -Path "gui/src-tauri/binaries/future-agent-$triple.exe" | Out-Null
          New-Item -ItemType File -Force -Path "gui/src-tauri/binaries/future-$triple.exe" | Out-Null

      - name: cargo check (workspace)
        if: needs.changes.outputs.rust_workspace == 'true'
        run: cargo check --workspace --manifest-path Cargo.toml

      - name: cargo check (GUI Tauri backend)
        if: needs.changes.outputs.gui_tauri == 'true'
        run: cargo check --manifest-path gui/src-tauri/Cargo.toml

  # ─── CLI: typecheck + bun test ───────────────────────────────────────────
  # `bun run test` runs the unit set only (src/commands + browser unit tests);
  # real-browser suites (validation/characterization) are opt-in via
  # `npm run test:browser` since they need Chrome/Safari on the machine.
  # Platform-agnostic — a single OS covers it.
  cli:
    name: CLI typecheck + test
    needs: changes
    if: needs.changes.outputs.cli == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: cli/package-lock.json

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # npm ci also runs postinstall → gen-version (version.generated.ts is
      # gitignored and required by tsc).
      - name: Install dependencies
        working-directory: cli
        run: npm ci

      - name: Typecheck
        working-directory: cli
        run: npx tsc --noEmit

      - name: bun test
        working-directory: cli
        run: bun run test

  # ─── TUI: typecheck + bun test ───────────────────────────────────────────
  tui:
    name: TUI typecheck + test
    needs: changes
    if: needs.changes.outputs.tui == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: tui/package-lock.json

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: tui
        run: npm ci

      - name: Typecheck
        working-directory: tui
        run: npx tsc --noEmit

      - name: bun test
        working-directory: tui
        run: bun test

  # ─── GUI: typecheck + eslint + stylelint + vitest ─────────────────────────
  # Frontend only. The Tauri *backend* Rust is covered by rust-build (compile,
  # 3-platform) and rust-quality (lint + test, hard gate). Platform-agnostic.
  gui:
    name: GUI typecheck + lint + test
    needs: changes
    if: needs.changes.outputs.gui_frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - name: Install dependencies
        working-directory: gui
        run: npm ci

      - name: Typecheck
        working-directory: gui
        run: npx tsc --noEmit

      - name: ESLint
        working-directory: gui
        run: npm run lint

      - name: Stylelint
        working-directory: gui
        run: npm run stylelint

      - name: vitest
        working-directory: gui
        run: npm run test
