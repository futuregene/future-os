name: CI

permissions: read-all

# Fast feedback on every push to main, every PR, and on manual dispatch:
# lint + typecheck + tests + a 3-platform Rust compile check. Full
# cross-platform *packaging* stays in build.yml (tags / dispatch) — this
# workflow exists so breakage (especially platform-conditional Rust that only
# shows up on Windows/macOS) is caught BEFORE a release build is cut.
on:
  push:
    branches: [main]
  pull_request:
  # Lets you run the whole PR-check suite manually from the Actions tab
  # (e.g. to verify a cross-platform fix on a feature branch without a PR).
  workflow_dispatch:

# Re-pushing a branch cancels its stale run; release tags are unaffected
# (this workflow never triggers on tags anyway).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Rust quality gate (Linux): fmt + clippy + tests ─────────────────────
  # Lint and test ALL Rust crates in one hard gate: the workspace members
  # (agent / channels / remote) plus the GUI Tauri backend. Platform-agnostic,
  # so one OS suffices; Windows/macOS *compilation* is the rust-build job's
  # job. clippy implicitly compiles, so this also covers Linux compilation of
  # every crate (the rust-build Linux leg re-checks them — a deliberate,
  # cached, incremental overlap kept so that matrix stays symmetric).
  rust-quality:
    name: Rust fmt + clippy + tests (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Pinned to match rust-toolchain.toml so CI and local dev use the same
      # compiler. Bump both together (see build.yml for the same pin).
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.97.0

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            gui/src-tauri
          cache-on-failure: true
          cache-all-crates: true

      # protoc for the workspace build.rs proto codegen. mold + binutils
      # because .cargo/config.toml pins -fuse-ld=mold and clippy/test still
      # link build scripts, proc-macros and test binaries. WebKit/GTK for the
      # Tauri -sys build scripts (GUI backend is part of this gate now).
      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            binutils \
            mold \
            pkg-config \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            protobuf-compiler

      # tauri-build's build script aborts with `resource path ... doesn't exist`
      # unless every `bundle.externalBin` sidecar is present. For lint/test
      # empty placeholders suffice.
      - name: Create placeholder sidecars
        run: |
          triple=$(rustc -Vv | sed -n 's/^host: //p')
          mkdir -p gui/src-tauri/binaries
          : > "gui/src-tauri/binaries/future-agent-$triple"
          : > "gui/src-tauri/binaries/future-$triple"

      # ── Workspace crates (agent / channels / remote) ──
      # --all because the root manifest is a virtual workspace (no [package]);
      # --manifest-path would fail with "Failed to find targets".
      - name: rustfmt (workspace)
        run: cargo fmt --check --all

      - name: clippy (workspace)
        run: cargo clippy --workspace --all-targets --manifest-path Cargo.toml -- -D warnings

      - name: cargo test (workspace)
        run: cargo test --workspace --manifest-path Cargo.toml

      # ── GUI Tauri backend ──
      - name: rustfmt (GUI backend)
        run: cargo fmt --check --manifest-path gui/src-tauri/Cargo.toml

      - name: clippy (GUI backend)
        run: cargo clippy --all-targets --manifest-path gui/src-tauri/Cargo.toml -- -D warnings

      - name: cargo test (GUI backend)
        run: cargo test --manifest-path gui/src-tauri/Cargo.toml

  # ─── Rust 3-platform compile check ───────────────────────────────────────
  # The quality gate above only runs on Linux, so platform-conditional code was
  # never type-checked on Windows/macOS — exactly how the GUI Tauri backend
  # regressed twice (a macOS-only fix dropped the `windows` crate and broke
  # Windows, and vice versa) with no PR signal. This matrix runs `cargo check`
  # on every release target so a missing `cfg`/crate surfaces on the PR.
  #
  # Scope: the whole workspace (agent / channels / remote) plus the GUI Tauri
  # backend. `cargo check` type-checks without linking the final crate, but it
  # DOES link build scripts / proc-macros, so each OS still needs its linker
  # story: Linux needs mold (`.cargo/config.toml`'s -fuse-ld=mold) and the
  # WebKit/GTK libs (the -sys build scripts run pkg-config); every OS needs
  # protoc for the workspace crates' build.rs (the GUI proto is checked in and
  # needs none). The GUI backend's `bundle.externalBin` sidecars don't exist in
  # a bare check, so we drop empty placeholders (tauri-build only checks
  # presence; `binaries/` is gitignored).
  rust-build:
    name: Rust build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
          - name: Windows
            os: windows-latest
          - name: macOS
            os: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.97.0

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            gui/src-tauri
          cache-on-failure: true
          cache-all-crates: true

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            binutils \
            mold \
            pkg-config \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            protobuf-compiler

      - name: Install macOS protoc
        if: runner.os == 'macOS'
        run: brew install protobuf

      # taiki-e/install-action is a composite action (no Node runtime /
      # deprecation warning); choco was unreliable at exposing protoc on PATH.
      - name: Install Windows protoc
        if: runner.os == 'Windows'
        uses: taiki-e/install-action@v2
        with:
          tool: protoc

      # tauri-build's build script aborts with `resource path ... doesn't exist`
      # unless every `bundle.externalBin` sidecar is present (host triple
      # appended, `.exe` on Windows). The packaging jobs build+copy the real
      # ones; for a type-check empty placeholders suffice. Split per-OS so
      # Windows uses pwsh natively instead of relying on git-bash's sed/case.
      - name: Create placeholder sidecars (Unix)
        if: runner.os != 'Windows'
        run: |
          triple=$(rustc -Vv | sed -n 's/^host: //p')
          mkdir -p gui/src-tauri/binaries
          : > "gui/src-tauri/binaries/future-agent-$triple"
          : > "gui/src-tauri/binaries/future-$triple"

      - name: Create placeholder sidecars (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $triple = (rustc -Vv | Select-String '^host:').Line.Split(' ')[1]
          New-Item -ItemType Directory -Force -Path gui/src-tauri/binaries | Out-Null
          New-Item -ItemType File -Force -Path "gui/src-tauri/binaries/future-agent-$triple.exe" | Out-Null
          New-Item -ItemType File -Force -Path "gui/src-tauri/binaries/future-$triple.exe" | Out-Null

      - name: cargo check (workspace)
        run: cargo check --workspace --manifest-path Cargo.toml

      - name: cargo check (GUI Tauri backend)
        run: cargo check --manifest-path gui/src-tauri/Cargo.toml

  # ─── Rust cross-platform compile check ───────────────────────────────────
  # The `rust` job above only ever compiles on Linux, so platform-conditional
  # code is never type-checked on Windows/macOS in CI. That is exactly how the
  # GUI Tauri backend regressed twice (a macOS-only fix dropped the `windows`
  # crate unconditionally, breaking Windows). This matrix runs `cargo check` on
  # all three release targets so a missing `cfg`/crate surfaces on the PR.
  #
  # Scope: the root workspace (agent + channels) and the GUI Tauri backend.
  # `remote/` is a standalone crate outside the workspace and is already
  # compiled by the Linux `rust` job; it is platform-agnostic and left out here
  # to keep this matrix focused. The GUI backend's proto is checked into
  # src/generated/ (build.rs only regenerates under REGENERATE_PROTO), so it
  # needs no protoc — but agent/channels regenerate proto on every build, so
  # protoc is installed on every runner. System-dep install is copied verbatim
  # from build.yml so this check runs in an environment proven to build.
  # `cargo check` type-checks without linking, so this is far cheaper than the
  # packaging jobs and needs no Node/npm (tauri-build reads config files only).
  rust-cross:
    name: Rust cross-check (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-22.04
          - name: Windows
            os: windows-latest
          - name: macOS
            os: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.97.0

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            gui/src-tauri
          cache-on-failure: true
          cache-all-crates: true

      # Tauri on Linux needs the WebKit/GTK system libraries even for `check`,
      # because the -sys crates' build scripts run pkg-config. `cargo check`
      # does not link the final crate, but it DOES link build scripts and
      # proc-macros (they are executables / .so that get run / loaded), and
      # `.cargo/config.toml` pins `-fuse-ld=mold` for this target — so mold must
      # be installed or those link steps fail with `collect2: cannot find 'ld'`.
      # binutils provides the traditional ld/collect2 toolchain.
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            binutils \
            mold \
            pkg-config \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            protobuf-compiler

      - name: Install macOS protoc
        if: runner.os == 'macOS'
        run: brew install protobuf

      # protoc for the agent/channels build.rs proto codegen (gui's proto is
      # checked in and needs none). taiki-e/install-action is a composite action
      # (no Node runtime / deprecation warning); choco was unreliable here.
      - name: Install Windows protoc
        if: runner.os == 'Windows'
        uses: taiki-e/install-action@v2
        with:
          tool: protoc

      # lib + bin only (no `--all-targets`): this matrix guards platform
      # conditional *compilation* (the E0433 class of regression), which shows
      # up in the default targets. The GUI backend's Rust tests have never been
      # compiled in CI, so pulling them in here would risk unrelated red on a
      # platform nobody has type-checked them on; agent/channels tests are
      # already compiled+run on Linux by the `rust` job.
      - name: cargo check (agent + channels)
        run: cargo check --workspace --manifest-path Cargo.toml

      # tauri-build's build script verifies every `bundle.externalBin` sidecar
      # exists (it appends the host triple, and `.exe` on Windows) and aborts
      # with `resource path ... doesn't exist` otherwise. The real sidecars are
      # produced by the packaging jobs; for a type-check the paths just need to
      # exist, so drop empty placeholders. CI-only — `binaries/` is gitignored.
      - name: Create placeholder sidecar binaries
        shell: bash
        run: |
          triple=$(rustc -Vv | sed -n 's/^host: //p')
          suf=""
          case "$triple" in *windows*) suf=".exe" ;; esac
          mkdir -p gui/src-tauri/binaries
          : > "gui/src-tauri/binaries/future-agent-$triple$suf"
          : > "gui/src-tauri/binaries/future-$triple$suf"

      - name: cargo check (GUI Tauri backend)
        run: cargo check --manifest-path gui/src-tauri/Cargo.toml

  # ─── CLI: typecheck + bun test ───────────────────────────────────────────
  # `bun run test` runs the unit set only (src/commands + browser unit tests);
  # real-browser suites (validation/characterization) are opt-in via
  # `npm run test:browser` since they need Chrome/Safari on the machine.
  # Platform-agnostic — a single OS covers it.
  cli:
    name: CLI typecheck + test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: cli/package-lock.json

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # npm ci also runs postinstall → gen-version (version.generated.ts is
      # gitignored and required by tsc).
      - name: Install dependencies
        working-directory: cli
        run: npm ci

      - name: Typecheck
        working-directory: cli
        run: npx tsc --noEmit

      - name: bun test
        working-directory: cli
        run: bun run test

  # ─── TUI: typecheck + bun test ───────────────────────────────────────────
  tui:
    name: TUI typecheck + test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: tui/package-lock.json

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: tui
        run: npm ci

      - name: Typecheck
        working-directory: tui
        run: npx tsc --noEmit

      - name: bun test
        working-directory: tui
        run: bun test

  # ─── GUI: typecheck + eslint + stylelint + vitest ─────────────────────────
  # Frontend only. The Tauri *backend* Rust is covered by rust-build (compile,
  # 3-platform) and rust-quality (lint + test, hard gate). Platform-agnostic.
  gui:
    name: GUI typecheck + lint + test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - name: Install dependencies
        working-directory: gui
        run: npm ci

      - name: Typecheck
        working-directory: gui
        run: npx tsc --noEmit

      - name: ESLint
        working-directory: gui
        run: npm run lint

      - name: Stylelint
        working-directory: gui
        run: npm run stylelint

      - name: vitest
        working-directory: gui
        run: npm run test
