name: Build FutureOS Windows (signed)

permissions: read-all

# Signed Windows build. Runs ONLY on the self-hosted Windows runner, because the
# Certum code signing key lives in a cloud HSM reachable only through a
# SimplySign Desktop session held open on that machine — a GitHub-hosted runner
# cannot reach it. Everything else (macOS, Linux, and the unsigned Windows build)
# stays in build.yml on GitHub-hosted runners.
#
# ┌────────────────────────────────────────────────────────────────────────────┐
# │ SECURITY — DO NOT ADD `pull_request` (OR `pull_request_target`,            │
# │ `issue_comment`, or any other externally-triggerable event) TO THIS FILE.  │
# │                                                                            │
# │ This repository is public and this workflow runs on a self-hosted runner   │
# │ holding a live code signing session. The job guard permits only manual     │
# │ runs and calls originating from a repository v* tag push. An externally-   │
# │ triggerable event                                                           │
# │ would let anyone run code on the signing machine and sign arbitrary        │
# │ binaries with our certificate — which gets the certificate revoked, not    │
# │ just the build broken. The private key cannot be stolen (it lives in the   │
# │ HSM); the ability to *use* it is what has to be protected.                 │
# └────────────────────────────────────────────────────────────────────────────┘
#
# Someone must be logged in to SimplySign Desktop on the runner when this runs:
# the session lasts 2-3 hours, so log in shortly before triggering. The preflight
# step fails in seconds if the session is dead, rather than after a 40-minute
# compile.
#
# Manual builds go to `test/<version>/`. Formal releases call this workflow from
# release.yml and consume its verified artifact; only the coordinator publishes
# to `releases/` and advances latest.json.

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      version:
        description: Exact release version supplied by the coordinator.
        required: true
        type: string
    secrets:
      TAURI_SIGNING_PRIVATE_KEY:
        required: true
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD:
        required: false
      TAURI_UPDATER_PUBLIC_KEY:
        required: true
      OSS_ENDPOINT:
        required: false
      OSS_BUCKET:
        required: false
      OSS_ACCESS_KEY_ID:
        required: false
      OSS_ACCESS_KEY_SECRET:
        required: false

jobs:
  build:
    name: Build signed Windows
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    runs-on: [self-hosted, Windows]
    # ossutil v2 auto-reads the OSS_* env vars; OSS_REGION is derived in the
    # Setup ossutil step (v2 signs with SigV4, which requires a region).
    env:
      OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
      OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
      OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
      OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # One presence check for every toolchain; the install steps below are gated
      # on these outputs so this long-lived machine skips the download. No
      # actions/cache anywhere in this workflow either: the runner keeps its own
      # target/ and node_modules, and round-tripping a multi-GB target dir through
      # GitHub's cache would cost more than the compile it saves.
      - name: Detect toolchains
        id: detect
        shell: powershell
        run: |
          function Have($c) { if (Get-Command $c -ErrorAction SilentlyContinue) { "true" } else { "false" } }
          @(
            "node=$(Have node)"
            "bun=$(Have bun)"
            "cargo=$(Have cargo)"
            "protoc=$(Have protoc)"
          ) | Add-Content -Path $env:GITHUB_OUTPUT

      - name: Setup Node.js
        if: steps.detect.outputs.node == 'false'
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup Bun
        if: steps.detect.outputs.bun == 'false'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Match the toolchain pinned in rust-toolchain.toml and the other CI
      # workflows, rather than accepting whichever stable version is current.
      - name: Install Rust
        if: steps.detect.outputs.cargo == 'false'
        shell: powershell
        run: |
          Invoke-WebRequest https://win.rustup.rs -OutFile "$env:RUNNER_TEMP\rustup-init.exe"
          & "$env:RUNNER_TEMP\rustup-init.exe" -y --default-toolchain 1.97.0
          "$env:USERPROFILE\.cargo\bin" | Add-Content -Path $env:GITHUB_PATH

      - name: Install protoc
        if: steps.detect.outputs.protoc == 'false'
        uses: taiki-e/install-action@v2
        with:
          tool: protoc

      # Single source of truth: scripts/version.mjs. A `vX.Y.Z` tag → release
      # ("X.Y.Z"); anything else → dev ("0.0.0-<hash>").
      - name: Resolve version
        id: v
        env:
          FUTURE_VERSION: ${{ inputs.version }}
        run: node scripts/version.mjs --github-output

      # Fail now, not after a 40-minute compile: the certificate is only visible
      # while the SimplySign session is live, so a forgotten login surfaces here,
      # in seconds. The thumbprint is resolved once and reused for every signature
      # in this build.
      #
      # timeout-minutes guards the nastiest failure mode: SimplySign's PIN cache
      # and its session expire on separate clocks (3h vs 2-3h), and signtool
      # answers an expired PIN cache with a *dialog box*. Unattended that hangs
      # rather than fails, and the job would otherwise burn the 6-hour default.
      - name: Preflight — signing certificate
        shell: powershell
        timeout-minutes: 5
        run: |
          . scripts/lib/windows-signing.ps1
          $cert = Resolve-SigningCert
          "SIGN_THUMBPRINT=$($cert.Thumbprint)" | Add-Content -Path $env:GITHUB_ENV
          Write-Host "cert   : $($cert.Subject)"
          Write-Host "expires: $($cert.NotAfter.ToString('yyyy-MM-dd'))"

      # Install ossutil v2 (detect-and-skip) and derive OSS_REGION for its SigV4
      # signer. Landed in a runner-temp dir added to PATH — no global install on
      # this long-lived machine.
      - name: Setup ossutil
        if: github.event_name == 'workflow_dispatch'
        shell: powershell
        run: |
          if (-not (Get-Command ossutil -ErrorAction SilentlyContinue)) {
            $ver = "2.2.0"
            $pkg = "ossutil-$ver-windows-amd64"
            Invoke-WebRequest "https://gosspublic.alicdn.com/ossutil/v2/$ver/$pkg.zip" -OutFile "$env:RUNNER_TEMP\ossutil.zip"
            Expand-Archive -Path "$env:RUNNER_TEMP\ossutil.zip" -DestinationPath "$env:RUNNER_TEMP\oss" -Force
            "$env:RUNNER_TEMP\oss\$pkg" | Add-Content -Path $env:GITHUB_PATH
          }
          $region = $env:OSS_ENDPOINT -replace '^https?://','' -replace '^oss-','' -replace '-internal','' -replace '\.aliyuncs\.com$',''
          "OSS_REGION=$region" | Add-Content -Path $env:GITHUB_ENV

      - name: Install npm dependencies (GUI)
        working-directory: gui
        run: npm ci

      - name: Install npm dependencies (CLI)
        working-directory: cli
        run: npm ci

      # Build the agent and stage it as a Tauri sidecar so the packaged app starts
      # it automatically (see bundle.externalBin in tauri.conf.json). The file must
      # be named future-agent-<target-triple> for Tauri to pick it up.
      - name: Build bundled agent
        shell: powershell
        env:
          FUTURE_VERSION: ${{ steps.v.outputs.version }}
        run: |
          cargo build --release --manifest-path agent/Cargo.toml
          $triple = (rustc -Vv | Select-String '^host:').Line.Split(' ')[1]
          New-Item -ItemType Directory -Force -Path gui/src-tauri/binaries | Out-Null
          Copy-Item "target/release/future-agent.exe" "gui/src-tauri/binaries/future-agent-$triple.exe"

      - name: Build CLI binary
        working-directory: cli
        shell: powershell
        env:
          FUTURE_VERSION: ${{ steps.v.outputs.version }}
        run: |
          npm run build
          bun build --compile dist/index.js --outfile dist/future.exe
          $triple = (rustc -Vv | Select-String '^host:').Line.Split(' ')[1]
          New-Item -ItemType Directory -Force -Path ../gui/src-tauri/binaries | Out-Null
          Copy-Item "dist/future.exe" "../gui/src-tauri/binaries/future-$triple.exe"

      # The bundler copies externalBin binaries into the installer as-is and never
      # signs them (it signs the app exe, the NSIS plugin DLLs and the setup), so
      # this is the last moment the sidecars can be signed without unpacking the
      # installer afterwards.
      - name: Sign sidecars
        shell: powershell
        timeout-minutes: 15
        run: |
          . scripts/lib/windows-signing.ps1
          $signTool = Find-SignTool
          $triple = (rustc -Vv | Select-String '^host:').Line.Split(' ')[1]
          foreach ($exe in @("future-agent-$triple.exe", "future-$triple.exe")) {
            $p = "gui/src-tauri/binaries/$exe"
            Invoke-SignFile -SignTool $signTool -Thumbprint $env:SIGN_THUMBPRINT -Path $p
            Write-Host "signed: $exe"
          }

      # Pin the Tauri installer version to the plain semver core (NSIS rejects
      # SemVer suffixes). The display version keeps the full FUTURE_VERSION.
      - name: Set Tauri bundle version
        run: node scripts/version.mjs --set-bundle

      # The overlay points bundle.windows.signCommand at scripts/sign-file.ps1;
      # it is generated per build rather than committed to tauri.conf.json so
      # build.yml (no certificate) and local dev builds are unaffected. A failing
      # sign command aborts the bundle — Tauri propagates the non-zero exit — so a
      # half-signed installer is never produced.
      - name: Build desktop bundle (signed)
        shell: powershell
        timeout-minutes: 120
        env:
          FUTURE_VERSION: ${{ steps.v.outputs.version }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
        run: |
          if (-not $env:TAURI_SIGNING_PRIVATE_KEY) { throw "TAURI_SIGNING_PRIVATE_KEY secret is required" }
          if (-not $env:TAURI_UPDATER_PUBLIC_KEY) { throw "TAURI_UPDATER_PUBLIC_KEY secret is required" }
          . scripts/lib/windows-signing.ps1
          $overlay = New-SignOverlayConfig -Thumbprint $env:SIGN_THUMBPRINT `
                                           -SignScript (Resolve-Path scripts/sign-file.ps1).Path
          $config = Get-Content $overlay -Raw | ConvertFrom-Json
          $config.bundle | Add-Member -NotePropertyName createUpdaterArtifacts -NotePropertyValue $true
          $config | Add-Member -NotePropertyName plugins -NotePropertyValue @{
            updater = @{
              pubkey = $env:TAURI_UPDATER_PUBLIC_KEY
              endpoints = @("https://dl.future-os.cn/releases/latest.json")
            }
          }
          $json = $config | ConvertTo-Json -Depth 10
          [IO.File]::WriteAllText($overlay, $json, [Text.UTF8Encoding]::new($false))
          Write-Host "overlay: $overlay"
          Push-Location gui
          try {
            npm run tauri:build -- --config $overlay
            if ($LASTEXITCODE -ne 0) { throw "tauri build failed (exit $LASTEXITCODE)" }
          }
          finally {
            Pop-Location
            Remove-Item -Force $overlay -ErrorAction SilentlyContinue
          }

      # Portable (install-free) build: the GUI exe plus the agent and CLI
      # binaries, all in one directory. Signed here rather than assumed: the
      # bundler signs its own copies on the way into the installer, so whether
      # target/release/futureos.exe itself ends up signed is its business. Signing
      # the staged copies makes the zip's contents certain either way.
      - name: Assemble Windows portable (signed)
        shell: powershell
        timeout-minutes: 15
        run: |
          . scripts/lib/windows-signing.ps1
          $signTool = Find-SignTool
          $triple = (rustc -Vv | Select-String '^host:').Line.Split(' ')[1]
          $dir = "futureos-portable"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          Copy-Item "gui/src-tauri/target/release/futureos.exe" "$dir/FutureOS.exe"
          Copy-Item "gui/src-tauri/binaries/future-agent-$triple.exe" "$dir/future-agent.exe"
          Copy-Item "cli/dist/future.exe" "$dir/future.exe"
          Copy-Item "docs/dist/readme-windows.txt" "$dir/Readme.txt"
          foreach ($exe in @("FutureOS.exe", "future-agent.exe", "future.exe")) {
            Invoke-SignFile -SignTool $signTool -Thumbprint $env:SIGN_THUMBPRINT -Path "$dir/$exe"
            Write-Host "signed: $exe"
          }
          Compress-Archive -Path "$dir/*" -DestinationPath "FutureOS-portable-windows.zip" -Force

      # Independent of what the bundler claims it did. The signature is the entire
      # point of this workflow, so a silently-unsigned artifact — or an
      # untimestamped one, which dies the day the certificate expires and takes
      # every already-shipped installer with it — must block the upload.
      - name: Verify signatures
        shell: powershell
        run: |
          . scripts/lib/windows-signing.ps1
          $signTool = Find-SignTool
          $installers = @(Get-ChildItem gui/src-tauri/target/release/bundle/nsis/*.exe -ErrorAction SilentlyContinue)
          if (-not $installers) { throw "Tauri produced no installer under bundle/nsis." }
          foreach ($f in $installers) {
            if (-not (Test-Path "$($f.FullName).sig")) {
              throw "Tauri produced no updater signature for $($f.Name)."
            }
          }
          $bad = @()
          foreach ($f in $installers + @(Get-ChildItem futureos-portable/*.exe)) {
            $state = Get-SignatureState -SignTool $signTool -Path $f.FullName
            Write-Host ("{0,-12} {1}" -f $state, $f.Name)
            if ($state -ne "signed") { $bad += $f.Name }
          }
          if ($bad) { throw "Not properly signed: $($bad -join ', ')" }

      - name: Stage signed artifacts
        shell: powershell
        run: |
          $stage = "signed-release"
          Remove-Item -Recurse -Force $stage -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $stage | Out-Null

          Get-ChildItem gui/src-tauri/target/release/bundle/nsis/*.exe | ForEach-Object {
            $name = "$([IO.Path]::GetFileNameWithoutExtension($_.Name))-sign$($_.Extension)"
            $output = Join-Path $stage $name
            Copy-Item $_.FullName $output
            Copy-Item "$($_.FullName).sig" "$output.sig"
          }
          Copy-Item "FutureOS-portable-windows.zip" (Join-Path $stage "FutureOS-portable-windows-sign.zip")

          Get-ChildItem $stage | Select-Object -ExpandProperty Name

      - name: Upload signed Windows installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: futureos-windows-signed
          if-no-files-found: error
          overwrite: true
          path: |
            signed-release/*-setup-sign.exe
            signed-release/*-setup-sign.exe.sig
          retention-days: 7

      - name: Upload signed Windows portable artifact
        uses: actions/upload-artifact@v7
        with:
          name: futureos-windows-portable-signed
          if-no-files-found: error
          overwrite: true
          path: signed-release/*-portable-windows-sign.zip
          retention-days: 7

      - name: Upload to OSS test channel
        if: github.event_name == 'workflow_dispatch'
        shell: powershell
        run: |
          $version = "${{ steps.v.outputs.version }}"
          Write-Host "==> Uploading to oss://$env:OSS_BUCKET/test/$version/"
          Get-ChildItem signed-release | Select-Object -ExpandProperty Name
          ossutil cp -r -f "signed-release\" "oss://$env:OSS_BUCKET/test/$version/"
          if ($LASTEXITCODE -ne 0) { throw "ossutil upload failed (exit $LASTEXITCODE)" }

          Write-Host "==> Download URLs:"
          Get-ChildItem signed-release | ForEach-Object { Write-Host "  https://dl.future-os.cn/test/$version/$($_.Name)" }
