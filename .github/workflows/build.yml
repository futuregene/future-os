name: Build FutureOS apps (GUI + TUI + CLI + agent)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            artifact_name: futureos-macos
            # macOS ships as a .dmg: it preserves the .app bundle (exec bit,
            # symlinks) that a raw upload-artifact zip would strip. The TUI/CLI
            # binaries are injected into the .app alongside the agent sidecar.
            bundle_path: gui/src-tauri/target/release/bundle/dmg/*.dmg
          - name: Windows
            os: windows-latest
            artifact_name: futureos-windows
            # Both installers (NSIS setup .exe + MSI). Coexists with the portable
            # zip (uploaded as futureos-windows-portable below), which carries the
            # GUI, agent, TUI, and CLI in one directory.
            bundle_path: |
              gui/src-tauri/target/release/bundle/nsis/*.exe
              gui/src-tauri/target/release/bundle/msi/*.msi
          - name: Linux
            os: ubuntu-22.04
            artifact_name: futureos-linux
            bundle_path: gui/src-tauri/target/release/bundle/**

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            gui/package-lock.json
            tui/package-lock.json
            cli/package-lock.json

      # Bun is required to build the TUI (proto codegen) and to compile the
      # TUI/CLI into standalone single-file binaries (bun build --compile).
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Pinned to match rust-toolchain.toml so CI and local dev use the same
      # compiler. Bump both together.
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.96.0

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            agent
            gui/src-tauri

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            protobuf-compiler \
            wget

      - name: Install macOS system dependencies
        if: runner.os == 'macOS'
        run: brew install protobuf

      # `choco install protoc` exits 0 but doesn't reliably expose protoc on PATH
      # for the cargo/Tauri build (the failure only surfaces on a rust-cache miss,
      # when build.rs actually re-runs proto codegen). setup-protoc installs it and
      # puts it on PATH deterministically. repo-token avoids GitHub API rate limits.
      - name: Install Windows protoc
        if: runner.os == 'Windows'
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install npm dependencies (GUI)
        working-directory: gui
        run: npm ci

      - name: Install npm dependencies (TUI)
        working-directory: tui
        run: npm ci

      - name: Install npm dependencies (CLI)
        working-directory: cli
        run: npm ci

      # Build the agent and stage it as a Tauri sidecar so the packaged app
      # starts it automatically (see bundle.externalBin in tauri.conf.json).
      # The file must be named future-agent-<target-triple> for Tauri to pick it.
      - name: Build bundled agent (Unix)
        if: runner.os != 'Windows'
        run: |
          cargo build --release --manifest-path agent/Cargo.toml
          triple=$(rustc -Vv | sed -n 's/^host: //p')
          mkdir -p gui/src-tauri/binaries
          cp "agent/target/release/future-agent" "gui/src-tauri/binaries/future-agent-$triple"

      - name: Build bundled agent (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cargo build --release --manifest-path agent/Cargo.toml
          $triple = (rustc -Vv | Select-String '^host:').Line.Split(' ')[1]
          New-Item -ItemType Directory -Force -Path gui/src-tauri/binaries | Out-Null
          Copy-Item "agent/target/release/future-agent.exe" "gui/src-tauri/binaries/future-agent-$triple.exe"

      # Compile the TUI into a standalone binary (no Node runtime needed).
      - name: Build TUI binary (Unix)
        if: runner.os != 'Windows'
        working-directory: tui
        run: |
          npm run build
          bun build --compile dist/index.js --outfile dist/future-tui

      - name: Build TUI binary (Windows)
        if: runner.os == 'Windows'
        working-directory: tui
        shell: pwsh
        run: |
          npm run build
          bun build --compile dist/index.js --outfile dist/future-tui.exe

      # Compile the CLI into a standalone binary. chromium-bidi is a lazily
      # required optional dep of playwright-core (only the WebDriver-BiDi path,
      # never the default CDP path) — mark it external so the bundle resolves.
      - name: Build CLI binary (Unix)
        if: runner.os != 'Windows'
        working-directory: cli
        run: |
          npm run build
          bun build --compile dist/index.js --outfile dist/future-cli --external chromium-bidi

      - name: Build CLI binary (Windows)
        if: runner.os == 'Windows'
        working-directory: cli
        shell: pwsh
        run: |
          npm run build
          bun build --compile dist/index.js --outfile dist/future-cli.exe --external chromium-bidi

      - name: Build desktop bundle
        working-directory: gui
        run: npm run tauri:build

      # macOS: co-locate the agent (already a sidecar), TUI, and CLI inside the
      # .app's Contents/MacOS, and ship first-launch (Gatekeeper) instructions in
      # the dmg — the .app is unsigned/un-notarized. Tauri's dmg is read-only, so
      # round-trip it through a read-write image to inject everything.
      - name: Bundle agent, TUI & CLI into macOS .app (inside dmg)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          src=$(ls gui/src-tauri/target/release/bundle/dmg/*.dmg | head -n1)
          work="$RUNNER_TEMP/rw.dmg"
          out="$RUNNER_TEMP/out.dmg"
          mnt="$RUNNER_TEMP/mnt"
          hdiutil convert "$src" -format UDRW -o "$work"
          hdiutil resize -size 700m "$work"
          mkdir -p "$mnt"
          hdiutil attach "$work" -mountpoint "$mnt" -nobrowse -noverify
          app=$(ls -d "$mnt"/*.app | head -n1)
          macos_dir="$app/Contents/MacOS"
          cp "tui/dist/future-tui" "$macos_dir/future-tui"
          cp "cli/dist/future-cli" "$macos_dir/future-cli"
          chmod +x "$macos_dir/future-tui" "$macos_dir/future-cli"
          cp "docs/dist/macos-first-launch.txt" "$mnt/请先阅读-如何打开.txt"
          # Ad-hoc sign the injected binaries first, then re-seal the bundle.
          codesign --force --sign - "$macos_dir/future-tui"
          codesign --force --sign - "$macos_dir/future-cli"
          codesign --force --sign - "$app"
          hdiutil detach "$mnt"
          hdiutil convert "$work" -format UDZO -o "$out"
          mv -f "$out" "$src"

      - name: Upload desktop bundle
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          path: ${{ matrix.bundle_path }}

      # Portable (install-free) Windows build: the GUI exe plus the agent, TUI,
      # and CLI binaries, all in one directory. The agent sidecar is renamed
      # without the triple (as Tauri does on bundling) so the GUI finds it next
      # to the exe. Requires the WebView2 Evergreen runtime (ships with Win 10/11).
      - name: Assemble Windows portable
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $triple = (rustc -Vv | Select-String '^host:').Line.Split(' ')[1]
          $dir = "futureos-portable"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          Copy-Item "gui/src-tauri/target/release/futureos.exe" "$dir/FutureOS.exe"
          Copy-Item "gui/src-tauri/binaries/future-agent-$triple.exe" "$dir/future-agent.exe"
          Copy-Item "tui/dist/future-tui.exe" "$dir/future-tui.exe"
          Copy-Item "cli/dist/future-cli.exe" "$dir/future-cli.exe"
          Copy-Item "docs/dist/windows-portable-README.txt" "$dir/使用说明.txt"
          Compress-Archive -Path "$dir/*" -DestinationPath "FutureOS-portable-windows.zip" -Force

      - name: Upload Windows portable
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: futureos-windows-portable
          if-no-files-found: error
          path: FutureOS-portable-windows.zip

      # Portable (install-free) Linux build: the GUI binary plus the agent, TUI,
      # and CLI binaries, all in one directory.
      - name: Assemble Linux portable
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          dir="futureos-portable-linux"
          mkdir -p "$dir"
          cp "gui/src-tauri/target/release/futureos" "$dir/futureos"
          cp "agent/target/release/future-agent" "$dir/future-agent"
          cp "tui/dist/future-tui" "$dir/future-tui"
          cp "cli/dist/future-cli" "$dir/future-cli"
          chmod +x "$dir"/*
          tar -czf FutureOS-portable-linux.tar.gz -C "$dir" .

      - name: Upload Linux portable
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: futureos-linux-portable
          if-no-files-found: error
          path: FutureOS-portable-linux.tar.gz
