name: Build FutureOS app

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  # Compute the build version once (single source of truth: scripts/version.mjs).
  # A `vX.Y.Z` tag → release ("X.Y.Z"); anything else → dev ("0.0.0-dev.<hash>").
  # Downstream jobs read these outputs; is_release gates the release job.
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      is_release: ${{ steps.v.outputs.is_release }}
      bundle_version: ${{ steps.v.outputs.bundle_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Resolve version
        id: v
        run: node scripts/version.mjs --github-output

  build:
    name: Build ${{ matrix.name }}
    needs: version
    runs-on: ${{ matrix.os }}
    # Injected into every build step so Rust build.rs (FUTURE_VERSION → agent,
    # GUI) and the TS build scripts (generated version module) all agree.
    env:
      FUTURE_VERSION: ${{ needs.version.outputs.version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            artifact_name: futureos-macos
            # macOS ships as a .dmg: it preserves the .app bundle (exec bit,
            # symlinks) that a raw upload-artifact zip would strip. The CLI
            # binary is injected into the .app alongside the agent sidecar.
            bundle_path: gui/src-tauri/target/release/bundle/dmg/*.dmg
          - name: Windows
            os: windows-latest
            artifact_name: futureos-windows
            # Both installers (NSIS setup .exe + MSI). Coexists with the portable
            # zip (uploaded as futureos-windows-portable below), which carries the
            # GUI, agent, and CLI in one directory.
            bundle_path: |
              gui/src-tauri/target/release/bundle/nsis/*.exe
              gui/src-tauri/target/release/bundle/msi/*.msi
          - name: Linux
            os: ubuntu-22.04
            artifact_name: futureos-linux
            # .deb only. AppImage self-bundles the whole WebKitGTK stack (~130MB
            # per build) and rpm isn't targeted — both are dropped in
            # tauri.conf.json ("targets"), so nothing else lands under bundle/.
            bundle_path: gui/src-tauri/target/release/bundle/deb/*.deb

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            gui/package-lock.json
            cli/package-lock.json

      # Bun compiles the CLI into a standalone single-file binary
      # (bun build --compile). The TUI is not packaged here (local test only).
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Pinned to match rust-toolchain.toml so CI and local dev use the same
      # compiler. Bump both together.
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.96.0

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            agent
            gui/src-tauri
          # Persist the target dir even when a later step fails, so a broken
          # release run doesn't throw away a full cold compile.
          cache-on-failure: true
          # Cache every dependency crate, not just direct workspace deps —
          # covers transitive/build-dep crates that otherwise recompile.
          cache-all-crates: true

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            lld \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            protobuf-compiler \
            wget

      - name: Install macOS system dependencies
        if: runner.os == 'macOS'
        run: brew install protobuf

      # protoc for the cargo/Tauri proto codegen (only re-runs on a rust-cache
      # miss, when build.rs regenerates). taiki-e/install-action is a composite
      # action (no Node runtime), so unlike arduino/setup-protoc it doesn't emit
      # the Node 20 deprecation warning; it fetches protoc from upstream releases
      # and puts it on PATH. `choco install protoc` was unreliable at exposing it.
      - name: Install Windows protoc
        if: runner.os == 'Windows'
        uses: taiki-e/install-action@v2
        with:
          tool: protoc

      - name: Install npm dependencies (GUI)
        working-directory: gui
        run: npm ci

      - name: Install npm dependencies (CLI)
        working-directory: cli
        run: npm ci

      # Windows Defender real-time scanning inspects every intermediate file the
      # Rust compiler and linker emit — thousands of them — and is the single
      # biggest drag on the Windows job. Turn it off for the runner (which has
      # admin rights); it's a throwaway VM. Never fail the build if Defender is
      # policy-managed and refuses.
      - name: Disable Windows Defender real-time scanning
        if: runner.os == 'Windows'
        shell: pwsh
        continue-on-error: true
        run: Set-MpPreference -DisableRealtimeMonitoring $true

      # Build the agent and stage it as a Tauri sidecar so the packaged app
      # starts it automatically (see bundle.externalBin in tauri.conf.json).
      # The file must be named future-agent-<target-triple> for Tauri to pick it.
      - name: Build bundled agent (Unix)
        if: runner.os != 'Windows'
        run: |
          cargo build --release --manifest-path agent/Cargo.toml
          triple=$(rustc -Vv | sed -n 's/^host: //p')
          mkdir -p gui/src-tauri/binaries
          cp "agent/target/release/future-agent" "gui/src-tauri/binaries/future-agent-$triple"

      - name: Build bundled agent (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cargo build --release --manifest-path agent/Cargo.toml
          $triple = (rustc -Vv | Select-String '^host:').Line.Split(' ')[1]
          New-Item -ItemType Directory -Force -Path gui/src-tauri/binaries | Out-Null
          Copy-Item "agent/target/release/future-agent.exe" "gui/src-tauri/binaries/future-agent-$triple.exe"

      # Compile the CLI into a standalone binary. chromium-bidi is a lazily
      # required optional dep of playwright-core (only the WebDriver-BiDi path,
      # never the default CDP path) — mark it external so the bundle resolves.
      - name: Build CLI binary (Unix)
        if: runner.os != 'Windows'
        working-directory: cli
        run: |
          npm run build
          bun build --compile dist/index.js --outfile dist/future-cli --external chromium-bidi

      - name: Build CLI binary (Windows)
        if: runner.os == 'Windows'
        working-directory: cli
        shell: pwsh
        run: |
          npm run build
          bun build --compile dist/index.js --outfile dist/future-cli.exe --external chromium-bidi

      # Pin the Tauri installer version to the plain semver core (MSI/NSIS reject
      # SemVer suffixes). The display version keeps the full FUTURE_VERSION.
      - name: Set Tauri bundle version
        run: node scripts/version.mjs --set-bundle

      - name: Build desktop bundle
        working-directory: gui
        run: npm run tauri:build

      # macOS: co-locate the agent (already a sidecar) and CLI inside the
      # .app's Contents/MacOS, and ship first-launch (Gatekeeper) instructions in
      # the dmg — the .app is unsigned/un-notarized. Tauri's dmg is read-only, so
      # round-trip it through a read-write image to inject everything.
      - name: Bundle agent & CLI into macOS .app (inside dmg)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          src=$(ls gui/src-tauri/target/release/bundle/dmg/*.dmg | head -n1)
          work="$RUNNER_TEMP/rw.dmg"
          out="$RUNNER_TEMP/out.dmg"
          mnt="$RUNNER_TEMP/mnt"
          hdiutil convert "$src" -format UDRW -o "$work"
          hdiutil resize -size 700m "$work"
          mkdir -p "$mnt"
          hdiutil attach "$work" -mountpoint "$mnt" -nobrowse -noverify
          app=$(ls -d "$mnt"/*.app | head -n1)
          macos_dir="$app/Contents/MacOS"
          cp "cli/dist/future-cli" "$macos_dir/future-cli"
          chmod +x "$macos_dir/future-cli"
          cp "docs/dist/macos-first-launch.txt" "$mnt/请先阅读-如何打开.txt"
          # Ad-hoc sign the injected binary first, then re-seal the bundle.
          codesign --force --sign - "$macos_dir/future-cli"
          codesign --force --sign - "$app"
          hdiutil detach "$mnt"
          hdiutil convert "$work" -format UDZO -o "$out"
          mv -f "$out" "$src"

      - name: Upload desktop bundle
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          path: ${{ matrix.bundle_path }}
          # Dev/test bundles — expire fast so the shared Actions storage quota
          # doesn't fill up. Release assets live on the GitHub Release, not here.
          retention-days: 3

      # Portable (install-free) Windows build: the GUI exe plus the agent and
      # CLI binaries, all in one directory. The agent sidecar is renamed
      # without the triple (as Tauri does on bundling) so the GUI finds it next
      # to the exe. Requires the WebView2 Evergreen runtime (ships with Win 10/11).
      - name: Assemble Windows portable
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $triple = (rustc -Vv | Select-String '^host:').Line.Split(' ')[1]
          $dir = "futureos-portable"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          Copy-Item "gui/src-tauri/target/release/futureos.exe" "$dir/FutureOS.exe"
          Copy-Item "gui/src-tauri/binaries/future-agent-$triple.exe" "$dir/future-agent.exe"
          Copy-Item "cli/dist/future-cli.exe" "$dir/future-cli.exe"
          Copy-Item "docs/dist/windows-portable-README.txt" "$dir/使用说明.txt"
          Compress-Archive -Path "$dir/*" -DestinationPath "FutureOS-portable-windows.zip" -Force

      - name: Upload Windows portable
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: futureos-windows-portable
          if-no-files-found: error
          path: FutureOS-portable-windows.zip
          retention-days: 3

      # Portable (install-free) Linux build: the GUI binary plus the agent and
      # CLI binaries, all in one directory.
      - name: Assemble Linux portable
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          dir="futureos-portable-linux"
          mkdir -p "$dir"
          cp "gui/src-tauri/target/release/futureos" "$dir/futureos"
          cp "agent/target/release/future-agent" "$dir/future-agent"
          cp "cli/dist/future-cli" "$dir/future-cli"
          chmod +x "$dir"/*
          tar -czf FutureOS-portable-linux.tar.gz -C "$dir" .

      - name: Upload Linux portable
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: futureos-linux-portable
          if-no-files-found: error
          path: FutureOS-portable-linux.tar.gz
          retention-days: 3

  # Publish a GitHub Release with all platform bundles attached. Runs only for
  # release builds (a `vX.Y.Z` tag); manual/dispatch runs are dev and stop at
  # uploaded artifacts. Release notes are auto-generated from commits/PRs.
  release:
    name: Publish release
    needs: [version, build]
    if: needs.version.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # OSS coordinates come from repo secrets. ossutil v2 auto-reads the OSS_*
    # env vars (endpoint + credentials) — no config file needed. OSS_REGION is
    # derived from the endpoint in the Setup step (v2 signs with SigV4, which
    # requires a region). See docs/WIKI-MAINTENANCE.md / repo settings.
    env:
      OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
      OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
      OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
      OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
    steps:
      # Needed for scripts/setup-ossutil.sh (this job otherwise only handles
      # artifacts and never checks out the repo).
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download all build artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-assets

      # latest.json is the auto-upgrade manifest: for now it carries just the
      # version and publish time (download URLs come later, once the CDN domain
      # is live). Generated before the release step so it can be attached to the
      # GitHub Release too, not only pushed to OSS.
      - name: Generate latest.json
        run: |
          set -euo pipefail
          cat > latest.json <<EOF
          {
            "version": "${{ needs.version.outputs.version }}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          echo "==> latest.json:"
          cat latest.json

      # Curate what actually ships to users. The portable builds (Windows zip,
      # Linux tarball) are TESTER-ONLY: they remain as Actions artifacts
      # (downloadable from the run) but are NOT published to the GitHub Release
      # or OSS. Only the end-user installers ship:
      #   macOS .dmg · Windows .exe + .msi · Linux .deb
      # Files are flattened into publish/ (no per-artifact subfolders) so the
      # Release and the OSS releases/<version>/ layout stay clean.
      - name: Stage publishable installers
        run: |
          set -euo pipefail
          mkdir -p publish
          find release-assets -type f \( \
            -name '*.dmg' -o \
            -name '*-setup.exe' -o \
            -name '*.msi' -o \
            -name '*.deb' \) -exec cp -v {} publish/ \;
          echo "==> Staged for release/OSS:"
          ls -1 publish

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: FutureOS ${{ needs.version.outputs.version }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            publish/*
            latest.json

      # ─── Mirror the release to Aliyun OSS ──────────────────────────────────
      # ossutil v2 is fetched directly from Aliyun's public CDN (no third-party
      # action). Auth is entirely via the OSS_* env vars set at the job level.
      - name: Setup ossutil
        run: bash scripts/setup-ossutil.sh

      # Each release gets its own versioned folder: releases/<version>/… (flat,
      # installers only). latest.json is written to a fixed key so consumers
      # always read releases/latest.json.
      - name: Upload release to OSS
        run: |
          set -euo pipefail
          VERSION="${{ needs.version.outputs.version }}"
          echo "==> Uploading installers to releases/$VERSION/"
          ossutil cp -r -f publish/ "oss://$OSS_BUCKET/releases/$VERSION/"
          echo "==> Uploading latest.json to releases/latest.json"
          ossutil cp -f latest.json "oss://$OSS_BUCKET/releases/latest.json"
