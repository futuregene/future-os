name: Build FutureOS app (self-hosted)

# Self-hosted variant of build.yml, made to avoid consuming GitHub Actions
# minutes/storage. Differences from build.yml:
#   1. Runs on the self-hosted runners (Linux / macOS / Windows).
#   2. No GitHub caching (no setup-node cache, no Swatinem/rust-cache).
#   3. Build artifacts go straight to Aliyun OSS — never to GitHub artifact
#      storage or a GitHub Release. Test (dev) builds land under test/<version>/,
#      release builds under releases/<version>/. Both use the versioned string
#      from scripts/version.mjs (release = X.Y.Z, dev = 0.0.0-<hash>).
# Toolchains are detected and only installed when missing (the runners are
# long-lived machines that usually already have them).

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  # Compute the build version once (single source of truth: scripts/version.mjs).
  # A `vX.Y.Z` tag → release ("X.Y.Z"); anything else → dev ("0.0.0-<hash>").
  version:
    name: Resolve version
    runs-on: [self-hosted, Linux]
    outputs:
      version: ${{ steps.v.outputs.version }}
      is_release: ${{ steps.v.outputs.is_release }}
      bundle_version: ${{ steps.v.outputs.bundle_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Detect toolchains
        id: detect
        shell: bash
        run: |
          have() { command -v "$1" >/dev/null 2>&1 && echo true || echo false; }
          echo "node=$(have node)" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        if: steps.detect.outputs.node == 'false'
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Resolve version
        id: v
        run: node scripts/version.mjs --github-output

  build:
    name: Build ${{ matrix.name }}
    needs: version
    runs-on: ${{ matrix.os }}
    # Injected into every build step so Rust build.rs (FUTURE_VERSION → agent,
    # GUI) and the TS build scripts (generated version module) all agree.
    # OSS_* let each runner push its own bundles directly to OSS (ossutil v2
    # auto-reads them; OSS_REGION is derived in the Setup ossutil step).
    env:
      FUTURE_VERSION: ${{ needs.version.outputs.version }}
      OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
      OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
      OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
      OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: [self-hosted, macOS]
          - name: Windows
            os: [self-hosted, Windows]
          - name: Linux
            os: [self-hosted, Linux]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # One presence check for every toolchain; install steps below are gated on
      # these outputs so an already-provisioned runner skips the download. Split
      # by OS: the self-hosted Windows runner's bash mangles the Windows script
      # path handed to it by the runner, so Windows detection runs in pwsh.
      - name: Detect toolchains (Unix)
        id: detect
        if: runner.os != 'Windows'
        shell: bash
        run: |
          have() { command -v "$1" >/dev/null 2>&1 && echo true || echo false; }
          # This shell is `bash --noprofile --norc`, so ~/.cargo/env is never
          # sourced and ~/.cargo/bin is off PATH — `command -v cargo` would report
          # false on a runner that already has rustup. Probe the binary directly.
          if command -v cargo >/dev/null 2>&1 || [ -x "$HOME/.cargo/bin/cargo" ]; then
            cargo=true
          else
            cargo=false
          fi
          {
            echo "node=$(have node)"
            echo "bun=$(have bun)"
            echo "cargo=$cargo"
            echo "protoc=$(have protoc)"
          } >> "$GITHUB_OUTPUT"

      - name: Detect toolchains (Windows)
        id: detect_win
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          function Have($c) { if (Get-Command $c -ErrorAction SilentlyContinue) { "true" } else { "false" } }
          @(
            "node=$(Have node)"
            "bun=$(Have bun)"
            "cargo=$(Have cargo)"
            "protoc=$(Have protoc)"
          ) | Add-Content -Path $env:GITHUB_OUTPUT

      - name: Setup Node.js
        if: steps.detect.outputs.node == 'false' || steps.detect_win.outputs.node == 'false'
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup Bun
        if: steps.detect.outputs.bun == 'false' || steps.detect_win.outputs.bun == 'false'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # rust-toolchain.toml pins `channel = "stable"`, so a bare rustup install
      # picks up the right toolchain on first cargo invocation. We install rustup
      # only when cargo is absent; an existing install is left untouched.
      - name: Install Rust (Unix)
        if: steps.detect.outputs.cargo == 'false' && runner.os != 'Windows'
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable

      # Run whether or not the install step fired: later steps also use
      # `--noprofile`, so ~/.cargo/bin must be put on PATH explicitly here for a
      # pre-provisioned runner where the install step was (correctly) skipped.
      - name: Add cargo to PATH (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [ -d "$HOME/.cargo/bin" ]; then
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          fi

      - name: Install Rust (Windows)
        if: steps.detect_win.outputs.cargo == 'false' && runner.os == 'Windows'
        shell: powershell
        run: |
          Invoke-WebRequest https://win.rustup.rs -OutFile "$env:RUNNER_TEMP\rustup-init.exe"
          & "$env:RUNNER_TEMP\rustup-init.exe" -y --default-toolchain stable
          "$env:USERPROFILE\.cargo\bin" | Add-Content -Path $env:GITHUB_PATH

      # Linux GUI/build system libs. `pkg-config` probe skips the (sudo) apt-get
      # when the WebKitGTK stack and patchelf are already present.
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          if pkg-config --exists webkit2gtk-4.1 gtk+-3.0 2>/dev/null \
            && command -v patchelf >/dev/null && command -v protoc >/dev/null; then
            echo "System dependencies already present — skipping apt-get."
          else
            sudo apt-get update
            sudo apt-get install -y \
              build-essential \
              curl \
              file \
              lld \
              libayatana-appindicator3-dev \
              libgtk-3-dev \
              librsvg2-dev \
              libssl-dev \
              libwebkit2gtk-4.1-dev \
              patchelf \
              protobuf-compiler \
              wget
          fi

      - name: Install macOS protoc
        if: runner.os == 'macOS' && steps.detect.outputs.protoc == 'false'
        run: brew install protobuf

      - name: Install Windows protoc
        if: runner.os == 'Windows' && steps.detect_win.outputs.protoc == 'false'
        uses: taiki-e/install-action@v2
        with:
          tool: protoc

      # Install ossutil v2 (detect-and-skip) and derive OSS_REGION for its SigV4
      # signer. Landed in a runner-temp dir added to PATH — no sudo, no global
      # install on these long-lived machines.
      - name: Setup ossutil (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v ossutil >/dev/null 2>&1; then
            ver="2.2.0"
            case "$(uname -s)" in Linux) plat=linux;; Darwin) plat=mac;; esac
            case "$(uname -m)" in x86_64|amd64) arch=amd64;; arm64|aarch64) arch=arm64;; esac
            pkg="ossutil-${ver}-${plat}-${arch}"
            curl -fsSL -o "$RUNNER_TEMP/ossutil.zip" "https://gosspublic.alicdn.com/ossutil/v2/${ver}/${pkg}.zip"
            unzip -q -o "$RUNNER_TEMP/ossutil.zip" -d "$RUNNER_TEMP/oss"
            mkdir -p "$RUNNER_TEMP/ossbin"
            mv "$RUNNER_TEMP/oss/${pkg}/ossutil" "$RUNNER_TEMP/ossbin/ossutil"
            chmod +x "$RUNNER_TEMP/ossbin/ossutil"
            echo "$RUNNER_TEMP/ossbin" >> "$GITHUB_PATH"
          fi
          region="$(printf '%s' "${OSS_ENDPOINT:?OSS_ENDPOINT is required}" \
            | sed -E 's#^https?://##; s/^oss-//; s/-internal//; s/\.aliyuncs\.com$//')"
          echo "OSS_REGION=$region" >> "$GITHUB_ENV"

      - name: Setup ossutil (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          if (-not (Get-Command ossutil -ErrorAction SilentlyContinue)) {
            $ver = "2.2.0"
            $pkg = "ossutil-$ver-windows-amd64"
            Invoke-WebRequest "https://gosspublic.alicdn.com/ossutil/v2/$ver/$pkg.zip" -OutFile "$env:RUNNER_TEMP\ossutil.zip"
            Expand-Archive -Path "$env:RUNNER_TEMP\ossutil.zip" -DestinationPath "$env:RUNNER_TEMP\oss" -Force
            "$env:RUNNER_TEMP\oss\$pkg" | Add-Content -Path $env:GITHUB_PATH
          }
          $region = $env:OSS_ENDPOINT -replace '^https?://','' -replace '^oss-','' -replace '-internal','' -replace '\.aliyuncs\.com$',''
          "OSS_REGION=$region" | Add-Content -Path $env:GITHUB_ENV

      - name: Install npm dependencies (GUI)
        working-directory: gui
        run: npm ci

      - name: Install npm dependencies (CLI)
        working-directory: cli
        run: npm ci

      # Build the agent and stage it as a Tauri sidecar so the packaged app
      # starts it automatically (see bundle.externalBin in tauri.conf.json).
      # The file must be named future-agent-<target-triple> for Tauri to pick it.
      - name: Build bundled agent (Unix)
        if: runner.os != 'Windows'
        run: |
          cargo build --release --manifest-path agent/Cargo.toml
          triple=$(rustc -Vv | sed -n 's/^host: //p')
          mkdir -p gui/src-tauri/binaries
          cp "agent/target/release/future-agent" "gui/src-tauri/binaries/future-agent-$triple"

      - name: Build bundled agent (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          cargo build --release --manifest-path agent/Cargo.toml
          $triple = (rustc -Vv | Select-String '^host:').Line.Split(' ')[1]
          New-Item -ItemType Directory -Force -Path gui/src-tauri/binaries | Out-Null
          Copy-Item "agent/target/release/future-agent.exe" "gui/src-tauri/binaries/future-agent-$triple.exe"

      # Compile the CLI into a standalone binary. chromium-bidi is a lazily
      # required optional dep of playwright-core (only the WebDriver-BiDi path,
      # never the default CDP path) — mark it external so the bundle resolves.
      - name: Build CLI binary (Unix)
        if: runner.os != 'Windows'
        working-directory: cli
        run: |
          npm run build
          bun build --compile dist/index.js --outfile dist/future --external chromium-bidi
          # Stage it as a Tauri sidecar too (bundle.externalBin) so the CLI ships
          # inside the installers, not just the portable packages.
          triple=$(rustc -Vv | sed -n 's/^host: //p')
          mkdir -p ../gui/src-tauri/binaries
          cp dist/future "../gui/src-tauri/binaries/future-$triple"

      - name: Build CLI binary (Windows)
        if: runner.os == 'Windows'
        working-directory: cli
        shell: powershell
        run: |
          npm run build
          bun build --compile dist/index.js --outfile dist/future.exe --external chromium-bidi
          # Stage it as a Tauri sidecar too (bundle.externalBin) so the CLI ships
          # inside the msi/nsis installers, not just the portable zip.
          $triple = (rustc -Vv | Select-String '^host:').Line.Split(' ')[1]
          New-Item -ItemType Directory -Force -Path ../gui/src-tauri/binaries | Out-Null
          Copy-Item "dist/future.exe" "../gui/src-tauri/binaries/future-$triple.exe"

      # Pin the Tauri installer version to the plain semver core (MSI/NSIS reject
      # SemVer suffixes). The display version keeps the full FUTURE_VERSION.
      - name: Set Tauri bundle version
        run: node scripts/version.mjs --set-bundle

      - name: Build desktop bundle
        working-directory: gui
        run: npm run tauri:build

      # macOS: agent + CLI are now Tauri sidecars (bundle.externalBin), so both
      # already sit in the .app's Contents/MacOS, signed by Tauri. We only need
      # to drop the first-launch (Gatekeeper) note into the dmg — the .app is
      # unsigned/un-notarized. Tauri's dmg is read-only, so round-trip it through
      # a read-write image, add the note, and re-seal the .app ad-hoc.
      - name: Inject first-launch note into macOS dmg
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          src=$(ls gui/src-tauri/target/release/bundle/dmg/*.dmg | head -n1)
          work="$RUNNER_TEMP/rw.dmg"
          out="$RUNNER_TEMP/out.dmg"
          mnt="$RUNNER_TEMP/mnt"
          hdiutil convert "$src" -format UDRW -o "$work"
          hdiutil resize -size 700m "$work"
          mkdir -p "$mnt"
          hdiutil attach "$work" -mountpoint "$mnt" -nobrowse -noverify
          app=$(ls -d "$mnt"/*.app | head -n1)
          cp "docs/dist/readme-macos.txt" "$mnt/Readme.txt"
          codesign --force --sign - "$app"
          hdiutil detach "$mnt"
          hdiutil convert "$work" -format UDZO -o "$out"
          mv -f "$out" "$src"

      # Portable (install-free) Windows build: the GUI exe plus the agent and
      # CLI binaries, all in one directory. The agent sidecar is renamed
      # without the triple (as Tauri does on bundling) so the GUI finds it next
      # to the exe. Requires the WebView2 Evergreen runtime (ships with Win 10/11).
      - name: Assemble Windows portable
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $triple = (rustc -Vv | Select-String '^host:').Line.Split(' ')[1]
          $dir = "futureos-portable"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          Copy-Item "gui/src-tauri/target/release/futureos.exe" "$dir/FutureOS.exe"
          Copy-Item "gui/src-tauri/binaries/future-agent-$triple.exe" "$dir/future-agent.exe"
          Copy-Item "cli/dist/future.exe" "$dir/future.exe"
          Copy-Item "docs/dist/readme-windows.txt" "$dir/Readme.txt"
          Compress-Archive -Path "$dir/*" -DestinationPath "FutureOS-portable-windows.zip" -Force

      # Portable (install-free) Linux build: the GUI binary plus the agent and
      # CLI binaries, all in one directory.
      - name: Assemble Linux portable
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          dir="futureos-portable-linux"
          mkdir -p "$dir"
          cp "gui/src-tauri/target/release/futureos" "$dir/futureos"
          cp "agent/target/release/future-agent" "$dir/future-agent"
          cp "cli/dist/future" "$dir/future"
          chmod +x "$dir"/*
          cp "docs/dist/readme-linux.txt" "$dir/Readme.txt"
          tar -czf FutureOS-portable-linux.tar.gz -C "$dir" .

      # ─── Push this platform's bundles straight to OSS ──────────────────────
      # Release builds → releases/<version>/, dev/test builds → test/<version>/.
      # Both installers and portable packages are uploaded (there is no GitHub
      # artifact fallback in this workflow). Files are flattened into the
      # versioned folder — no per-platform subfolders.
      - name: Upload to OSS (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.version.outputs.version }}"
          if [ "${{ needs.version.outputs.is_release }}" = "true" ]; then PREFIX=releases; else PREFIX=test; fi
          stage="$RUNNER_TEMP/oss-stage"; rm -rf "$stage"; mkdir -p "$stage"
          cp gui/src-tauri/target/release/bundle/dmg/*.dmg "$stage/"
          echo "==> Uploading to oss://$OSS_BUCKET/$PREFIX/$VERSION/"
          ls -1 "$stage"
          ossutil cp -r -f "$stage/" "oss://$OSS_BUCKET/$PREFIX/$VERSION/"
          host="${OSS_ENDPOINT#https://}"; host="${host#http://}"; host="${host/-internal/}"
          echo "==> Download URLs:"
          for f in "$stage"/*; do echo "  https://$OSS_BUCKET.$host/$PREFIX/$VERSION/$(basename "$f")"; done

      - name: Upload to OSS (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.version.outputs.version }}"
          if [ "${{ needs.version.outputs.is_release }}" = "true" ]; then PREFIX=releases; else PREFIX=test; fi
          stage="$RUNNER_TEMP/oss-stage"; rm -rf "$stage"; mkdir -p "$stage"
          cp gui/src-tauri/target/release/bundle/deb/*.deb "$stage/"
          cp FutureOS-portable-linux.tar.gz "$stage/"
          echo "==> Uploading to oss://$OSS_BUCKET/$PREFIX/$VERSION/"
          ls -1 "$stage"
          ossutil cp -r -f "$stage/" "oss://$OSS_BUCKET/$PREFIX/$VERSION/"
          host="${OSS_ENDPOINT#https://}"; host="${host#http://}"; host="${host/-internal/}"
          echo "==> Download URLs:"
          for f in "$stage"/*; do echo "  https://$OSS_BUCKET.$host/$PREFIX/$VERSION/$(basename "$f")"; done

      - name: Upload to OSS (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $version = "${{ needs.version.outputs.version }}"
          if ("${{ needs.version.outputs.is_release }}" -eq "true") { $prefix = "releases" } else { $prefix = "test" }
          $stage = "$env:RUNNER_TEMP\oss-stage"
          Remove-Item -Recurse -Force $stage -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "gui/src-tauri/target/release/bundle/nsis/*.exe" $stage
          Copy-Item "gui/src-tauri/target/release/bundle/msi/*.msi" $stage
          Copy-Item "FutureOS-portable-windows.zip" $stage
          Write-Host "==> Uploading to oss://$env:OSS_BUCKET/$prefix/$version/"
          Get-ChildItem $stage | Select-Object -ExpandProperty Name
          ossutil cp -r -f "$stage\" "oss://$env:OSS_BUCKET/$prefix/$version/"
          $ossHost = $env:OSS_ENDPOINT -replace '^https?://','' -replace '-internal',''
          Write-Host "==> Download URLs:"
          Get-ChildItem $stage | ForEach-Object { Write-Host "  https://$env:OSS_BUCKET.$ossHost/$prefix/$version/$($_.Name)" }

  # Write the auto-upgrade manifest for releases only. Dev/test builds live under
  # test/<version>/ with no fixed pointer. Runs after all platform uploads.
  finalize:
    name: Publish latest.json
    needs: [version, build]
    if: needs.version.outputs.is_release == 'true'
    runs-on: [self-hosted, Linux]
    env:
      OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
      OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
      OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
      OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup ossutil
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v ossutil >/dev/null 2>&1; then
            ver="2.2.0"
            case "$(uname -m)" in x86_64|amd64) arch=amd64;; arm64|aarch64) arch=arm64;; esac
            pkg="ossutil-${ver}-linux-${arch}"
            curl -fsSL -o "$RUNNER_TEMP/ossutil.zip" "https://gosspublic.alicdn.com/ossutil/v2/${ver}/${pkg}.zip"
            unzip -q -o "$RUNNER_TEMP/ossutil.zip" -d "$RUNNER_TEMP/oss"
            mkdir -p "$RUNNER_TEMP/ossbin"
            mv "$RUNNER_TEMP/oss/${pkg}/ossutil" "$RUNNER_TEMP/ossbin/ossutil"
            chmod +x "$RUNNER_TEMP/ossbin/ossutil"
            echo "$RUNNER_TEMP/ossbin" >> "$GITHUB_PATH"
          fi
          region="$(printf '%s' "${OSS_ENDPOINT:?OSS_ENDPOINT is required}" \
            | sed -E 's#^https?://##; s/^oss-//; s/-internal//; s/\.aliyuncs\.com$//')"
          echo "OSS_REGION=$region" >> "$GITHUB_ENV"

      - name: Generate and upload latest.json
        shell: bash
        run: |
          set -euo pipefail
          cat > latest.json <<EOF
          {
            "version": "${{ needs.version.outputs.version }}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          echo "==> latest.json:"; cat latest.json
          ossutil cp -f latest.json "oss://$OSS_BUCKET/releases/latest.json"
          host="${OSS_ENDPOINT#https://}"; host="${host#http://}"; host="${host/-internal/}"
          echo "==> Download URL:"
          echo "  https://$OSS_BUCKET.$host/releases/latest.json"
