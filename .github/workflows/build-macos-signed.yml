name: Build FutureOS macOS (signed)

permissions: read-all

# Signed and notarized macOS build. Keep this workflow restricted to trusted
# triggers: it imports the Developer ID certificate and can submit software to
# Apple's notarization service. Do not add pull_request or other events that can
# execute untrusted code with the signing credentials.
#
# Manual builds go to `test/<version>/`. Formal releases call this workflow from
# release.yml and consume its verified artifact; only the coordinator publishes
# to `releases/` and advances latest.json.

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      version:
        description: Exact release version supplied by the coordinator.
        required: true
        type: string
    secrets:
      MACOS_CERTIFICATE:
        required: true
      MACOS_CERTIFICATE_PWD:
        required: true
      APPLE_API_KEY:
        required: true
      APPLE_API_KEY_ID:
        required: true
      APPLE_API_ISSUER:
        required: true
      TAURI_SIGNING_PRIVATE_KEY:
        required: true
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD:
        required: false
      TAURI_UPDATER_PUBLIC_KEY:
        required: true
      OSS_ENDPOINT:
        required: false
      OSS_BUCKET:
        required: false
      OSS_ACCESS_KEY_ID:
        required: false
      OSS_ACCESS_KEY_SECRET:
        required: false

jobs:
  build:
    name: Build signed and notarized macOS (${{ matrix.name }})
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          # `macos-latest` is the GitHub-hosted Apple Silicon image.
          - name: Apple Silicon
            runner: macos-latest
            asset_arch: aarch64
            artifact_name: futureos-macos-signed
          # Keep the Intel build pinned to a named image: unlike
          # `macos-latest`, this cannot silently switch architectures.
          - name: Intel
            runner: macos-15-intel
            asset_arch: x64
            artifact_name: futureos-macos-intel-signed
    env:
      OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
      OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
      OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
      OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            gui/package-lock.json
            cli/package-lock.json

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.97.0

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            gui/src-tauri
          cache-on-failure: true
          cache-all-crates: true

      - name: Install macOS system dependencies
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"
        run: brew install protobuf

      # Import the base64-encoded Developer ID Application certificate into an
      # ephemeral keychain. Resolve its full identity rather than hard-coding the
      # team or company name, then pass it to Tauri and codesign.
      - name: Install Apple signing certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          set -euo pipefail
          : "${MACOS_CERTIFICATE:?MACOS_CERTIFICATE secret is required}"
          : "${MACOS_CERTIFICATE_PWD:?MACOS_CERTIFICATE_PWD secret is required}"

          keychain="$RUNNER_TEMP/futureos-signing.keychain-db"
          keychain_password="$(openssl rand -base64 32)"
          certificate="$RUNNER_TEMP/futureos-signing.p12"

          printf '%s' "$MACOS_CERTIFICATE" | base64 -D > "$certificate"
          security create-keychain -p "$keychain_password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_password" "$keychain"
          security import "$certificate" \
            -k "$keychain" \
            -P "$MACOS_CERTIFICATE_PWD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$keychain_password" "$keychain"
          security list-keychains -d user -s "$keychain"
          rm -f "$certificate"

          identity_line="$(security find-identity -v -p codesigning "$keychain" \
            | grep '"Developer ID Application:' | head -n 1 || true)"
          if [[ -z "$identity_line" ]]; then
            echo "No Developer ID Application identity found in the imported certificate." >&2
            security find-identity -v -p codesigning "$keychain" >&2 || true
            exit 1
          fi
          identity="${identity_line#*\"}"
          identity="${identity%%\"*}"
          echo "SIGNING_IDENTITY=$identity" >> "$GITHUB_ENV"
          echo "Using signing identity: $identity_line"

      - name: Resolve version
        id: v
        env:
          FUTURE_VERSION: ${{ inputs.version }}
        run: node scripts/version.mjs --github-output

      - name: Install npm dependencies (GUI)
        working-directory: gui
        run: npm ci

      - name: Install npm dependencies (CLI)
        working-directory: cli
        run: npm ci

      - name: Build bundled agent
        env:
          FUTURE_VERSION: ${{ steps.v.outputs.version }}
        run: |
          set -euo pipefail
          cargo build --release --manifest-path agent/Cargo.toml
          triple="$(rustc -Vv | sed -n 's/^host: //p')"
          mkdir -p gui/src-tauri/binaries
          cp target/release/future-agent "gui/src-tauri/binaries/future-agent-$triple"

      - name: Build CLI binary
        working-directory: cli
        env:
          FUTURE_VERSION: ${{ steps.v.outputs.version }}
        run: |
          set -euo pipefail
          npm run build
          bun build --compile dist/index.js --outfile dist/future
          triple="$(rustc -Vv | sed -n 's/^host: //p')"
          mkdir -p ../gui/src-tauri/binaries
          cp dist/future "../gui/src-tauri/binaries/future-$triple"

      - name: Set Tauri bundle version
        env:
          FUTURE_VERSION: ${{ steps.v.outputs.version }}
        run: node scripts/version.mjs --set-bundle

      # Let Tauri notarize and staple the app during bundling. This ordering is
      # important: the updater tarball must be created from the final notarized
      # app, then signed with the separate Tauri updater key. The DMG is created
      # afterwards, so it is a distinct distribution container and is notarized
      # and stapled in the next step.
      - name: Prepare Apple notarization key
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          set -euo pipefail
          : "${APPLE_API_KEY_CONTENT:?APPLE_API_KEY secret is required}"
          : "${APPLE_API_KEY_ID:?APPLE_API_KEY_ID secret is required}"
          api_key="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY_CONTENT" | base64 -D > "$api_key"
          chmod 600 "$api_key"
          echo "APPLE_API_KEY_PATH=$api_key" >> "$GITHUB_ENV"

      # tauri.conf.json intentionally uses the ad-hoc identity (`-`) for normal
      # builds. A per-run overlay keeps unsigned/local builds unchanged while
      # embedding the production updater endpoint/key only in formal artifacts.
      - name: Build desktop bundle (signed, notarized and updater-enabled)
        env:
          FUTURE_VERSION: ${{ steps.v.outputs.version }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          : "${TAURI_SIGNING_PRIVATE_KEY:?TAURI_SIGNING_PRIVATE_KEY secret is required}"
          : "${TAURI_UPDATER_PUBLIC_KEY:?TAURI_UPDATER_PUBLIC_KEY secret is required}"
          overlay="$RUNNER_TEMP/tauri.macos-sign.json"
          node -e '
            const fs = require("node:fs");
            fs.writeFileSync(process.argv[1], JSON.stringify({
              bundle: {
                createUpdaterArtifacts: true,
                macOS: { signingIdentity: process.env.SIGNING_IDENTITY }
              },
              plugins: {
                updater: {
                  pubkey: process.env.TAURI_UPDATER_PUBLIC_KEY,
                  endpoints: [
                    "https://dl.future-os.cn/releases/latest.json"
                  ]
                }
              }
            }));
          ' "$overlay"
          npm --prefix gui run tauri:build -- --config "$overlay"

      # Tauri notarizes the app before it creates the DMG. Apple treats the
      # resulting signed disk image as a separate distribution artifact: submit
      # it after creation and staple its own ticket so installation also works
      # when Gatekeeper cannot reach Apple's notarization service.
      - name: Notarize and staple DMG
        timeout-minutes: 60
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail
          : "${APPLE_API_KEY_PATH:?APPLE_API_KEY_PATH is required}"
          : "${APPLE_API_KEY_ID:?APPLE_API_KEY_ID secret is required}"
          : "${APPLE_API_ISSUER:?APPLE_API_ISSUER secret is required}"
          [[ -s "$APPLE_API_KEY_PATH" ]] || {
            echo "Apple notarization key is missing or empty: $APPLE_API_KEY_PATH" >&2
            exit 1
          }

          shopt -s nullglob
          dmgs=(gui/src-tauri/target/release/bundle/dmg/*.dmg)
          if [[ ${#dmgs[@]} -ne 1 ]]; then
            echo "Expected exactly one DMG, found ${#dmgs[@]}." >&2
            find gui/src-tauri/target/release/bundle/dmg -maxdepth 1 -type f -print >&2 || true
            exit 1
          fi
          dmg="${dmgs[0]}"

          # Verify the container before uploading it. Do not re-sign the DMG:
          # replacing a signature on the compressed image can produce a package
          # that behaves differently when verified in a fresh process.
          codesign --verify --strict --verbose=2 "$dmg"
          hdiutil verify "$dmg"

          response="$RUNNER_TEMP/futureos-dmg-notarization.json"
          notary_args=(
            --key "$APPLE_API_KEY_PATH"
            --key-id "$APPLE_API_KEY_ID"
            --issuer "$APPLE_API_ISSUER"
          )

          set +e
          xcrun notarytool submit \
            "${notary_args[@]}" \
            --wait \
            --timeout 45m \
            --output-format json \
            "$dmg" > "$response"
          submit_exit=$?
          set -e

          if [[ -s "$response" ]]; then
            cat "$response"
          fi
          submission_id="$(node -e '
            const fs = require("node:fs");
            try {
              const value = JSON.parse(fs.readFileSync(process.argv[1], "utf8")).id;
              if (value) process.stdout.write(String(value));
            } catch {}
          ' "$response")"
          notarization_status="$(node -e '
            const fs = require("node:fs");
            try {
              const value = JSON.parse(fs.readFileSync(process.argv[1], "utf8")).status;
              if (value) process.stdout.write(String(value));
            } catch {}
          ' "$response")"

          if [[ "$submit_exit" -ne 0 || "$notarization_status" != "Accepted" ]]; then
            echo "DMG notarization failed (exit=$submit_exit, status=${notarization_status:-unknown})." >&2
            if [[ -n "$submission_id" ]]; then
              echo "Apple notarization log for submission $submission_id:" >&2
              xcrun notarytool log "${notary_args[@]}" "$submission_id" || true
            fi
            exit 1
          fi

          # Apple recommends checking the completed submission log even after an
          # Accepted result. Surface every reported issue in the Actions summary,
          # but do not block an Apple-accepted release on advisory diagnostics.
          notary_log="$RUNNER_TEMP/futureos-dmg-notarization-log.json"
          log_downloaded=false
          for attempt in 1 2 3; do
            if xcrun notarytool log \
              "${notary_args[@]}" \
              "$submission_id" \
              "$notary_log"; then
              log_downloaded=true
              break
            fi
            if [[ "$attempt" -lt 3 ]]; then
              delay=$((attempt * 10))
              echo "Notarization log attempt $attempt failed; retrying in ${delay}s." >&2
              sleep "$delay"
            fi
          done
          [[ "$log_downloaded" == true && -s "$notary_log" ]] || {
            echo "Unable to retrieve the accepted notarization log." >&2
            exit 1
          }
          cat "$notary_log"
          notary_issue_count="$(node -e '
            const fs = require("node:fs");
            const data = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
            if (data.issues == null) {
              process.stdout.write("0");
            } else if (Array.isArray(data.issues)) {
              process.stdout.write(String(data.issues.length));
            } else {
              throw new Error("Apple notarization log has an invalid issues field");
            }
          ' "$notary_log")"
          if [[ "$notary_issue_count" != "0" ]]; then
            echo "::warning title=Apple notarization diagnostics::Apple accepted the DMG but reported $notary_issue_count issue(s); review the notarization log above."
          fi

          # An accepted ticket can take a short time to propagate to stapler.
          # Retry only the idempotent staple operation; never resubmit the DMG.
          stapled=false
          for attempt in 1 2 3 4 5; do
            if xcrun stapler staple -v "$dmg"; then
              stapled=true
              break
            fi
            if [[ "$attempt" -lt 5 ]]; then
              delay=$((attempt * 10))
              echo "Staple attempt $attempt failed; retrying in ${delay}s." >&2
              sleep "$delay"
            fi
          done
          [[ "$stapled" == true ]] || {
            echo "Unable to staple the accepted notarization ticket to $dmg." >&2
            exit 1
          }
          xcrun stapler validate -v "$dmg"
          echo "SIGNED_DMG=$dmg" >> "$GITHUB_ENV"

      # Validate the exact two user journeys, not only Tauri's build directory:
      # mount the website DMG and extract the automatic-updater archive. Both
      # copies of the app must retain their Developer ID signature and stapled
      # notarization ticket and must pass Gatekeeper assessment.
      - name: Verify distributable macOS artifacts
        run: |
          set -euo pipefail
          : "${SIGNED_DMG:?SIGNED_DMG is required}"
          shopt -s nullglob
          apps=(gui/src-tauri/target/release/bundle/macos/*.app)
          updaters=(gui/src-tauri/target/release/bundle/macos/*.app.tar.gz)
          updater_sigs=(gui/src-tauri/target/release/bundle/macos/*.app.tar.gz.sig)
          [[ ${#apps[@]} -eq 1 ]] || {
            echo "Expected exactly one .app bundle, found ${#apps[@]}." >&2
            exit 1
          }
          [[ ${#updaters[@]} -eq 1 ]] || {
            echo "Expected exactly one macOS updater archive, found ${#updaters[@]}." >&2
            exit 1
          }
          [[ ${#updater_sigs[@]} -eq 1 ]] || {
            echo "Expected exactly one macOS updater signature, found ${#updater_sigs[@]}." >&2
            exit 1
          }
          [[ -s "${updater_sigs[0]}" ]] || {
            echo "The macOS updater signature is empty." >&2
            exit 1
          }

          app="${apps[0]}"
          updater="${updaters[0]}"
          updater_sig="${updater_sigs[0]}"
          dmg="$SIGNED_DMG"
          [[ -s "$dmg" ]] || { echo "The notarized DMG is missing or empty: $dmg" >&2; exit 1; }

          codesign --verify --deep --strict --verbose=2 "$app"
          signature_info="$(codesign --display --verbose=4 "$app" 2>&1)"
          printf '%s\n' "$signature_info"
          grep -q 'flags=.*runtime' <<<"$signature_info" || {
            echo "The app signature does not enable hardened runtime." >&2
            exit 1
          }
          grep -q '^Authority=Developer ID Application:' <<<"$signature_info" || {
            echo "The app is not signed with a Developer ID Application certificate." >&2
            exit 1
          }
          grep -q '^Timestamp=' <<<"$signature_info" || {
            echo "The app signature has no secure timestamp." >&2
            exit 1
          }

          codesign --verify --strict --verbose=2 "$dmg"
          dmg_signature_info="$(codesign --display --verbose=4 "$dmg" 2>&1)"
          printf '%s\n' "$dmg_signature_info"
          grep -q '^Authority=Developer ID Application:' <<<"$dmg_signature_info" || {
            echo "The DMG is not signed with a Developer ID Application certificate." >&2
            exit 1
          }
          grep -q '^Timestamp=' <<<"$dmg_signature_info" || {
            echo "The DMG signature has no secure timestamp." >&2
            exit 1
          }

          xcrun stapler validate "$app"
          xcrun stapler validate "$dmg"
          spctl --assess --type execute --verbose=2 "$app"
          spctl --assess --type open \
            --context context:primary-signature --verbose=2 "$dmg"
          hdiutil verify "$dmg"

          updater_dir="$(mktemp -d "$RUNNER_TEMP/futureos-updater.XXXXXX")"
          mount_dir="$(mktemp -d "$RUNNER_TEMP/futureos-dmg.XXXXXX")"
          dmg_attached=false
          cleanup_verification() {
            if [[ "$dmg_attached" == true ]]; then
              hdiutil detach "$mount_dir" || true
            fi
            rm -rf "$updater_dir"
            rmdir "$mount_dir" 2>/dev/null || true
          }
          trap cleanup_verification EXIT

          tar -xzf "$updater" -C "$updater_dir"
          updater_apps=()
          while IFS= read -r -d '' candidate; do
            updater_apps[${#updater_apps[@]}]="$candidate"
          done < <(find "$updater_dir" -type d -name '*.app' -prune -print0)
          [[ ${#updater_apps[@]} -eq 1 ]] || {
            echo "Expected the updater archive to contain exactly one app, found ${#updater_apps[@]}." >&2
            exit 1
          }
          codesign --verify --deep --strict --verbose=2 "${updater_apps[0]}"
          xcrun stapler validate "${updater_apps[0]}"
          spctl --assess --type execute --verbose=2 "${updater_apps[0]}"

          hdiutil attach "$dmg" -readonly -nobrowse -mountpoint "$mount_dir"
          dmg_attached=true
          [[ -L "$mount_dir/Applications" \
             && "$(readlink "$mount_dir/Applications")" == "/Applications" ]] || {
            echo "The DMG has no standard Applications drag-to-install link." >&2
            exit 1
          }
          mounted_apps=()
          while IFS= read -r -d '' candidate; do
            mounted_apps[${#mounted_apps[@]}]="$candidate"
          done < <(find "$mount_dir" -maxdepth 1 -type d -name '*.app' -print0)
          [[ ${#mounted_apps[@]} -eq 1 ]] || {
            echo "Expected the DMG to contain exactly one app, found ${#mounted_apps[@]}." >&2
            exit 1
          }
          codesign --verify --deep --strict --verbose=2 "${mounted_apps[0]}"
          xcrun stapler validate "${mounted_apps[0]}"
          spctl --assess --type execute --verbose=2 "${mounted_apps[0]}"

          hdiutil detach "$mount_dir"
          dmg_attached=false
          rm -rf "$updater_dir"
          rmdir "$mount_dir"
          trap - EXIT

          echo "MACOS_UPDATER=$updater" >> "$GITHUB_ENV"
          echo "MACOS_UPDATER_SIG=$updater_sig" >> "$GITHUB_ENV"

      - name: Stage signed macOS artifacts
        run: |
          set -euo pipefail
          mkdir -p signed-release
          dmg_output="signed-release/FutureOS_${{ steps.v.outputs.version }}_${{ matrix.asset_arch }}-sign.dmg"
          updater_output="signed-release/FutureOS_${{ steps.v.outputs.version }}_${{ matrix.asset_arch }}.app.tar.gz"
          cp "$SIGNED_DMG" "$dmg_output"
          cp "$MACOS_UPDATER" "$updater_output"
          cp "$MACOS_UPDATER_SIG" "$updater_output.sig"
          echo "SIGNED_RELEASE_DMG=$dmg_output" >> "$GITHUB_ENV"

      - name: Upload signed macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          overwrite: true
          path: signed-release/*
          retention-days: 7

      - name: Setup ossutil
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          version="2.3.0"
          case "$(uname -m)" in
            arm64) arch="arm64" ;;
            x86_64) arch="amd64" ;;
            *) echo "Unsupported macOS architecture: $(uname -m)" >&2; exit 1 ;;
          esac
          package="ossutil-${version}-mac-${arch}"
          curl -fsSL \
            "https://gosspublic.alicdn.com/ossutil/v2/${version}/${package}.zip" \
            -o "$RUNNER_TEMP/ossutil.zip"
          unzip -q "$RUNNER_TEMP/ossutil.zip" -d "$RUNNER_TEMP/ossutil"
          chmod +x "$RUNNER_TEMP/ossutil/$package/ossutil"
          echo "$RUNNER_TEMP/ossutil/$package" >> "$GITHUB_PATH"

          region="$(printf '%s' "$OSS_ENDPOINT" \
            | sed -E 's#^https?://##; s/^oss-//; s/-internal//; s/\.aliyuncs\.com$//')"
          echo "OSS_REGION=$region" >> "$GITHUB_ENV"

      - name: Upload signed macOS artifacts to OSS
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          version="${{ steps.v.outputs.version }}"
          echo "==> Uploading macOS artifacts to oss://$OSS_BUCKET/test/$version/"
          ossutil cp -r -f signed-release/ "oss://$OSS_BUCKET/test/$version/"

          echo "==> Download URLs:"
          find signed-release -maxdepth 1 -type f -print | while read -r output; do
            echo "https://dl.future-os.cn/test/$version/$(basename "$output")"
          done

      - name: Clean up signing material
        if: always()
        run: |
          rm -f "$RUNNER_TEMP"/AuthKey_*.p8 "$RUNNER_TEMP/futureos-signing.p12"
          keychain="$RUNNER_TEMP/futureos-signing.keychain-db"
          if [[ -f "$keychain" ]]; then
            security delete-keychain "$keychain" || true
          fi
