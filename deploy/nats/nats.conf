# L0 dev NATS — JetStream + WebSocket
# Local / trusted-network only; production must enable tls{} + auth (see docs/remote-control-relay.md §8 / auth L0).
server_name: future-nats-dev

# Monitoring endpoint: http://localhost:8222
http_port: 8222

jetstream {
  store_dir: "/data/jetstream"
  max_memory_store: 256MB
  max_file_store: 5GB
}

# WebSocket for browser / nats.ws clients (async-nats Bridge uses port 4222)
websocket {
  port: 8080
  no_tls: true          # dev only; production: tls { cert_file, key_file }
}

# L0 dev — no auth by default. To add a basic gate (e.g. on LAN or staging),
# uncomment the block below:
# authorization { token: "dev-token-change-me" }
