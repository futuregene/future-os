# L0 NATS Relay template — JetStream + WebSocket + simple-pairing access token.
# The relay is publicly reachable for controlled testing, but the shared token
# is not a hostile multi-tenant boundary. Phase 2 replaces it with scoped JWTs.
server_name: future-nats-dev

# Monitoring endpoint: http://localhost:8222
http_port: 8222

jetstream {
  store_dir: "/data/jetstream"
  max_memory_store: 256MB
  max_file_store: 5GB
}

# Simple-pairing access control (Phase 1): a single shared token gates NATS
# admission for BOTH the desktop Bridge (port 4222) and web clients (ws 9090).
# The random pairId (subject namespace) is the partition; this token is the
# admission key. CHANGE this value, and keep the websocket block in sync.
# NOTE: this is a GLOBAL token, NOT per-pair — server-enforced per-subject
# isolation requires Phase 2 JWTs. See DEV_MD/remote-control-auth.md §8.9.
authorization {
  token: "devpairingtoken"
}

# WebSocket for browser / nats.ws clients (async-nats Bridge uses port 4222).
# The authorization block is repeated here so ws clients are also token-gated
# (keep the token identical to the global one above).
websocket {
  port: 9090
  no_tls: true          # dev only; production: tls { cert_file, key_file }
  authorization {
    token: "devpairingtoken"
  }
}
