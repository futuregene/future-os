# L0 dev NATS —— JetStream + WebSocket
# 仅本地/受控网络使用；公网必须换成 tls{} 并加鉴权（见 docs/remote-control-relay.md §8 / auth L0）。
server_name: future-nats-dev

# 监控端点：http://localhost:8222
http_port: 8222

jetstream {
  store_dir: "/data/jetstream"
  max_memory_store: 256MB
  max_file_store: 5GB
}

# 浏览器 / nats.ws 用（客户端默认端口 4222 供 async-nats Bridge 用）
websocket {
  port: 8080
  no_tls: true          # 仅 dev；公网改为 tls { cert_file, key_file }
}

# L0 dev 默认无鉴权。若要给它加个粗门（例如放到局域网/staging），取消下面注释：
# authorization { token: "dev-token-change-me" }
