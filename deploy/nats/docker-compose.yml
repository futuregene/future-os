# Local L0 dev NATS (JetStream + WebSocket). See README.md for usage.
services:
  nats:
    image: nats:2.10-alpine
    container_name: future-nats-dev
    command: ["-c", "/etc/nats/nats.conf"]
    ports:
      - "4222:4222"   # NATS client port (Bridge / async-nats)
      - "8080:8080"   # WebSocket (browser / nats.ws)
      - "8222:8222"   # Monitoring HTTP (optional)
    volumes:
      - ./nats.conf:/etc/nats/nats.conf:ro
      - nats-data:/data
    restart: unless-stopped

volumes:
  nats-data:
