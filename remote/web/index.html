<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Remote Control · Web 验证端 (L0)</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; font: 14px/1.5 -apple-system, system-ui, sans-serif;
    background:#0f1115; color:#e6e6e6;
    display:flex; flex-direction:column; height:100dvh; overflow:hidden;
  }

  /* ── 顶部连接设置 ───────────────────────────────────────── */
  header {
    display:flex; gap:8px; align-items:center; flex-wrap:wrap;
    padding:8px 12px; padding-top:max(8px, env(safe-area-inset-top));
    background:#171a21; border-bottom:1px solid #262a33; flex:none;
  }
  header input { background:#0f1115; color:#e6e6e6; border:1px solid #333; border-radius:6px; padding:6px 8px; font-size:13px; }
  header input.url-sm { flex:none; width:180px; } header input.code { flex:1; min-width:160px; }
  button { background:#2b6cff; color:#fff; border:0; border-radius:6px; padding:6px 12px; cursor:pointer; font-size:13px; }
  button.ghost { background:#262a33; }
  button.sm { padding:4px 10px; font-size:12px; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  #status { margin-left:auto; font-size:12px; padding:3px 8px; border-radius:999px; background:#333; white-space:nowrap; }
  #status.ok { background:#1f6f3f; } #status.err { background:#7f2b2b; }
  #presenceStatus { font-size:12px; padding:3px 8px; border-radius:999px; white-space:nowrap; }
  #presenceStatus.online { background:#1f6f3f; color:#fff; }
  #presenceStatus.offline { background:#4a4a4a; color:#9aa4b2; }
  .srow .streaming-dot { display:inline-block; width:6px; height:6px; border-radius:50%; background:#2b6cff; margin-right:4px; vertical-align:middle; }

  /* ── 主体：会话列表 + 对话区 ─────────────────────────────── */
  #app { flex:1; display:flex; min-height:0; }
  .pane-head {
    display:flex; align-items:center; gap:8px; padding:10px 12px;
    border-bottom:1px solid #262a33; background:#12151c; flex:none; font-size:13px;
  }
  .pane-head .title { font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .pane-head .spacer { flex:1; }
  .chk { display:flex; align-items:center; gap:4px; font-size:12px; color:#9aa4b2; white-space:nowrap; }
  .pane-head select {
    background:#0f1115; color:#e6e6e6; border:1px solid #333; border-radius:6px;
    padding:3px 6px; font-size:12px; max-width:140px;
  }
  .pane-head select:disabled { opacity:.5; }

  /* 会话列表 */
  #sidebar { display:flex; flex-direction:column; min-height:0; width:100%; border-right:1px solid #262a33; }
  #sessionList { flex:1; overflow:auto; -webkit-overflow-scrolling:touch; }
  .srow {
    display:flex; flex-direction:column; gap:2px; padding:11px 12px;
    border-bottom:1px solid #1c2029; cursor:pointer;
  }
  .srow:hover { background:#161a22; }
  .srow.active { background:#1b2436; box-shadow: inset 3px 0 0 #2b6cff; }
  .srow .st { font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .srow .ss { font-size:11px; color:#6b7482; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .hint { padding:16px 12px; color:#6b7482; font-size:12px; }

  /* 对话区 */
  #chat { display:none; flex:1; flex-direction:column; min-height:0; }
  #log { flex:1; overflow:auto; -webkit-overflow-scrolling:touch; display:flex; flex-direction:column; gap:8px; padding:12px; }
  .bubble { max-width:88%; border:1px solid #262a33; border-radius:12px; padding:9px 12px; background:#141821; white-space:pre-wrap; word-break:break-word; align-self:flex-start; }
  .bubble.user { background:#1b2436; border-color:#2c3b57; align-self:flex-end; }
  .role { font-size:11px; color:#9aa4b2; margin-bottom:3px; }
  .think { color:#8b93a1; font-style:italic; font-size:13px; }
  .chip { display:inline-block; font-size:12px; padding:2px 8px; margin:2px 4px 2px 0; border-radius:999px; background:#2a2f3a; }
  .chip.done { background:#1f6f3f; }
  .err { color:#ff7b72; }
  .badge { font-size:11px; color:#9aa4b2; align-self:center; }
  .approval { align-self:stretch; border:1px solid #7a5b1f; background:#241d0e; border-radius:10px; padding:10px 12px; }

  #composer { display:flex; gap:8px; padding:10px 12px; padding-bottom:max(10px, env(safe-area-inset-bottom)); border-top:1px solid #262a33; background:#12151c; flex:none; }
  #composer textarea { flex:1; background:#0f1115; color:#e6e6e6; border:1px solid #333; border-radius:10px; padding:9px; resize:none; min-height:44px; max-height:140px; font:inherit; }
  .composer-btns { display:flex; flex-direction:column; gap:6px; }
  .composer-btns button { min-width:64px; }
  .back-btn { display:none; }

  .empty { flex:1; display:flex; align-items:center; justify-content:center; color:#6b7482; font-size:13px; padding:20px; text-align:center; }

  /* ── 移动端：单栏切换（列表 ↔ 对话） ─────────────────────── */
  #app.show-chat #sidebar { display:none; }
  #app.show-chat #chat { display:flex; }
  .back-btn { display:inline-block; }

  /* ── 宽屏：左右双栏并排 ─────────────────────────────────── */
  @media (min-width:720px) {
    #sidebar { width:300px; flex:none; }
    #chat { display:flex; }
    #app.show-chat #sidebar { display:flex; }
    .back-btn { display:none; }
  }
</style>
</head>
<body>
<header>
  <input id="url" class="url-sm" value="ws://localhost:8080" placeholder="ws://host:8080" />
  <input id="paircode" class="code" placeholder="粘贴配对码 → 自动填 pairId / token（连接时也会自动解析）" />
  <button id="connect">连接</button>
  <span id="presenceStatus" class="offline">桌面离线</span>
  <span id="status">未连接</span>
</header>

<div id="app">
  <aside id="sidebar">
    <div class="pane-head">
      <span class="title">会话</span>
      <span class="spacer"></span>
      <button id="refresh" class="ghost sm" disabled>刷新</button>
      <button id="newsess" class="sm" disabled>新建</button>
    </div>
    <div id="sessionList"><div class="hint">连接后自动加载会话列表</div></div>
  </aside>

  <section id="chat">
    <div class="pane-head">
      <button id="back" class="ghost sm back-btn">‹ 会话</button>
      <span id="chatTitle" class="title">选择一个会话</span>
      <button id="renameBtn" class="ghost sm" title="重命名" style="display:none">✎</button>
      <span class="spacer"></span>
      <select id="modelSelect" style="display:none" title="模型"></select>
      <select id="thinkingSelect" style="display:none" title="思考等级"></select>
      <label class="chk"><input type="checkbox" id="verbose" /> 详细</label>
    </div>
    <div id="log"><div class="empty">从左侧选择会话，或点「新建」开始</div></div>
    <div id="composer">
      <textarea id="msg" placeholder="输入 prompt，Cmd/Ctrl+Enter 发送" disabled></textarea>
      <div class="composer-btns">
        <button id="send" disabled>发送</button>
      </div>
    </div>
  </section>
</div>

<script type="module">
import { connect } from "https://cdn.jsdelivr.net/npm/nats.ws@1/+esm";

const $ = (id) => document.getElementById(id);
const enc = (o) => new TextEncoder().encode(JSON.stringify(o));
const dec = (m) => JSON.parse(new TextDecoder().decode(m.data));

let nc = null, pair = "DEVPAIR", session = "", bubble = null, thinkEl = null;
let curRun = null; const seenEvents = new Set();
const toolChips = new Map();
let sessions = []; // 最近一次 list_sessions 结果，用于标题查找 + 高亮
let presence = null; // KV presence：桌面在线状态 + 每 session streaming
let isStreaming = false; // 当前选中会话是否在流式中（从事件或 presence 推断）
let presenceTimer = null; // 本地定时器：周期重算 presence 是否过期（watch 无事件时的兜底）
let availableModels = []; // list_models 结果缓存，连接时拉一次

function setStatus(t, cls) { const s = $("status"); s.textContent = t; s.className = cls || ""; }
function log(el) { $("log").appendChild(el); el.scrollIntoView({ block: "end" }); }
function line(text, cls) { const d = document.createElement("div"); d.className = cls || "badge"; d.textContent = text; log(d); return d; }
function clearLog() { $("log").innerHTML = ""; bubble = null; thinkEl = null; toolChips.clear(); }

function cmdSubject(sid) { return `p.${pair}.cmd.${sid || "new"}`; }

async function request(obj, sid) {
  const m = await nc.request(cmdSubject(sid ?? session), enc(obj), { timeout: 10000 });
  return dec(m);
}

// 解码桌面生成的配对码（base64url JSON）。web 是纯浏览器，没有 Tauri 桥，
// 故自行解码（配对码全 ASCII，atob 足够）。无效/过期返回 null。
function decodePairingCode(s) {
  try {
    let b64 = s.trim().replace(/-/g, "+").replace(/_/g, "/");
    while (b64.length % 4) b64 += "=";
    const pc = JSON.parse(atob(b64));
    if (pc?.v !== 1) return null;
    if (pc.exp && Math.floor(Date.now() / 1000) > pc.exp) return null;
    return pc;
  } catch { return null; }
}

// 本浏览器设备的稳定 id，用于 inboxPrefix（p.{pairId}.rep.{deviceId}）。无点。
function getDeviceId() {
  let id = localStorage.getItem("remote.deviceId");
  if (!id) {
    const r = () => Math.random().toString(16).slice(2);
    id = "dev_" + (crypto?.randomUUID?.().replace(/-/g, "") || (r() + r()));
    localStorage.setItem("remote.deviceId", id);
  }
  return id;
}

async function doConnect() {
  const url = $("url").value.trim();
  // pair/token 只来自配对码（手填框已移除）；无配对码 = dev / no-auth，pair 默认 DEVPAIR。
  let pair = "DEVPAIR";
  let token = "";
  const code = $("paircode").value.trim();
  if (code) {
    const pc = decodePairingCode(code);
    if (!pc) { setStatus("配对码无效或已过期", "err"); return; }
    pair = pc.pairId; token = pc.token;
  }
  if (!url) { setStatus("请填写 NATS websocket 地址", "err"); return; }
  try {
    setStatus("连接中…");
    const opts = { servers: url, inboxPrefix: `p.${pair}.rep.${getDeviceId()}` };
    if (token) opts.token = token;   // 简单配对接入 token；无 token = L0 无鉴权
    nc = await connect(opts);
    setStatus("已连接", "ok");
    $("newsess").disabled = false; $("refresh").disabled = false; $("connect").disabled = true;
    // 订阅本 pair 所有会话事件（按 subject 过滤到当前选中会话）
    const sub = nc.subscribe(`p.${pair}.evt.>`);
    (async () => { for await (const m of sub) onEvent(dec(m), m.subject); })();
    watchConnStatus();   // P1：断线/重连感知 → 重连后重放当前轮
    watchPresence();     // P1：KV presence → 桌面在线状态 + 每 session streaming
    // 本地兜底：watch 是事件驱动的，桌面停止后 KV 不再写入就收不到事件，
    // 指示器会卡在"在线"。每 10s 按 lastHeartbeatTs 重算一次过期。
    if (presenceTimer) clearInterval(presenceTimer);
    presenceTimer = setInterval(refreshPresenceIndicator, 10000);
    await loadModels();   // 拉取可用模型列表（连接时一次）
    await listSessions(); // 自动加载会话列表
  } catch (e) { setStatus("连接失败: " + (e?.message || String(e)), "err"); }
}

// KV presence：读 pairs 桶，感知桌面在线/离线 + 每 session streaming 态。
async function watchPresence() {
  try {
    const js = nc.jetstream();
    const kv = await js.views.kv("pairs");
    // 先读一次当前值
    try {
      const entry = await kv.get(pair);
      if (entry) onPresenceUpdate(JSON.parse(new TextDecoder().decode(entry.value)));
    } catch { /* key 不存在 = 桌面未上报 */ }
    // watch 后续变化
    const watch = await kv.watch(pair);
    (async () => {
      for await (const e of watch) {
        if (e.operation === "DEL" || e.operation === "PURGE") {
          onPresenceUpdate(null);
        } else {
          try { onPresenceUpdate(JSON.parse(new TextDecoder().decode(e.value))); } catch {}
        }
      }
    })();
  } catch { /* KV 不可用（JetStream 未启用等）：presence 功能静默降级 */ }
}

function onPresenceUpdate(data) {
  presence = data;
  refreshPresenceIndicator();
  // 更新当前会话 streaming 态
  if (data?.sessions && session) {
    const s = data.sessions.find(x => x.id === session);
    if (s) updateStreamingState(s.streaming);
  }
  renderSessionList(); // 刷新列表上的 streaming 指示
}

// 重算并渲染桌面在线/离线指示器。watch 是事件驱动的——桌面停止后 KV 不再
// 写入，watch 收不到任何事件，所以仅靠 onPresenceUpdate 无法让指示器随时间
// 翻转为离线。本地定时器周期调用本函数，按 lastHeartbeatTs 检测过期。
function refreshPresenceIndicator() {
  const el = $("presenceStatus");
  if (!el) return;
  const data = presence;
  const online = data?.online ?? false;
  const ts = data?.lastHeartbeatTs;
  // 超过 60s 未心跳视为离线（心跳间隔 20s，容忍丢 2 次）
  const stale = !ts || (Date.now() / 1000 - ts) > 60;
  if (!online || stale) {
    el.textContent = "桌面离线";
    el.className = "offline";
  } else {
    el.textContent = "桌面在线";
    el.className = "online";
  }
}

// 对齐 GUI：streaming 时发送键变"停止"(点击=abort)，composer 仍可编辑；
// 非 streaming 时为"发送"。没有独立的引导/排队/中断按钮——GUI 桌面端也没有，
// steer/follow_up 只服务 remote bridge，桌面 UI 从不使用。
function updateStreamingState(streaming) {
  isStreaming = streaming;
  const btn = $("send");
  if (!btn) return;
  if (streaming) {
    btn.textContent = "停止";
    btn.className = "ghost";
    btn.disabled = false;
    btn.onclick = abort;
  } else {
    btn.textContent = "发送";
    btn.className = "";
    btn.disabled = false;
    btn.onclick = send;
  }
}

// core pub/sub 在断连期间的事件会丢；nats.ws 会自动重连并恢复订阅，但那段空窗的
// 事件追不回来。重连后若已选会话，重跑一次 selectSession（拉历史 + 回放当前轮），
// seenEvents 去重保证不重复。
async function watchConnStatus() {
  try {
    for await (const s of nc.status()) {
      if (s.type === "disconnect") setStatus("连接断开，重连中…", "err");
      else if (s.type === "reconnect") {
        setStatus("已重连", "ok");
        if (session) selectSession(session);
      }
    }
  } catch { /* 连接关闭时迭代结束，正常退出 */ }
}

// 懒创建（对齐 GUI 新建对话）：点"新建"不写库，只把本地切到"待输入"态。
// thread + agent session 在用户发首条消息时由 bridge 的 prompt 路径创建，
// 所以列表里不会出现空 "New Chat" 条目，也不存在 id 错位。
function newSession() {
  session = "";                 // 占位：尚无 DB 条目 / agent session
  curRun = null; seenEvents.clear();
  clearLog();
  $("chatTitle").textContent = "新对话";
  updateStreamingState(false);  // 显示"发送"、隐藏引导/排队
  $("app").classList.add("show-chat");
  // 模型/思考选择器作为草稿显示；无 session 时 onchange 不会发命令，
  // 选中的值在 send 时随首条 prompt 一起发给 bridge seed 新 session。
  // 默认值对齐 GUI：localStorage 最近选择 → deepseek-v4-pro → isDefault → 首个。
  const lastModel = localStorage.getItem("remote.lastModelId") || "";
  const lastModelValid = availableModels.some(m => m.id === lastModel) ? lastModel : "";
  const defModel = lastModelValid
    || availableModels.find(m => m.id === "deepseek-v4-pro")?.id
    || availableModels.find(m => m.isDefault)?.id
    || availableModels[0]?.id
    || "";
  populateModelSelect(defModel);
  populateThinkingSelect(localStorage.getItem("remote.lastThinkingLevel") || "off");
  $("modelSelect").style.display = "";
  $("thinkingSelect").style.display = "";
  $("renameBtn").style.display = "none";   // 无 session 不能重命名
  $("msg").disabled = false;               // 发送键由 updateStreamingState(false) 设为"发送"
  document.querySelectorAll(".srow").forEach(r => r.classList.remove("active"));
  $("msg").focus?.();
}

async function listSessions() {
  try {
    const r = await request({ type: "list_sessions" }, "list");
    sessions = r?.data?.sessions || [];
    renderSessionList();
  } catch (e) {
    const errDiv = document.createElement("div");
    errDiv.className = "hint err";
    errDiv.textContent = `会话列表加载失败: ${(e?.message || e)}`;
    $("sessionList").replaceChildren(errDiv);
  }
}

function renderSessionList() {
  const box = $("sessionList");
  box.innerHTML = "";
  if (!sessions.length) { box.innerHTML = `<div class="hint">暂无会话，点右上「新建」</div>`; return; }
  for (const s of sessions) {
    const row = document.createElement("div");
    row.className = "srow" + (s.sessionId === session ? " active" : "");
    row.dataset.sid = s.sessionId;
    const t = document.createElement("div"); t.className = "st";
    // presence 里有该 session 的 streaming 态 → 显示蓝点
    const pInfo = presence?.sessions?.find(x => x.id === s.sessionId);
    if (pInfo?.streaming) {
      const dot = document.createElement("span"); dot.className = "streaming-dot";
      t.appendChild(dot);
    }
    t.appendChild(document.createTextNode(s.title || "(未命名)"));
    const sub = document.createElement("div"); sub.className = "ss"; sub.textContent = s.sessionId;
    row.append(t, sub);
    row.onclick = () => selectSession(s.sessionId);
    box.appendChild(row);
  }
}

function sessionTitle(sid) {
  return sessions.find((s) => s.sessionId === sid)?.title || "会话";
}

// run 结束后 agent 会按首条用户消息 auto-name 线程。web 没有 GUI 那套 store
// 事件监听，标题会停在新建时的 "New Chat"。这里在 agent_end 时主动刷新列表 +
// 标题。无竞态：auto-name 在 publish agent_end 之后同步落库，而 web 收到
// agent_end 要走一跳 NATS，届时 rename 早已提交。
async function refreshSessionTitle() {
  if (!session) return;
  try {
    await listSessions();
    const entry = sessions.find((s) => s.sessionId === session);
    if (entry?.title) $("chatTitle").textContent = entry.title;
  } catch { /* 刷新失败不影响主流程 */ }
}

// 切换到某会话：清屏 + 重置状态 + 拉历史 + 回放进行中轮 + 移动端切到对话视图。
async function selectSession(sid) {
  session = sid;
  curRun = null; seenEvents.clear();
  clearLog();
  $("chatTitle").textContent = sessionTitle(sid);
  $("msg").disabled = false;
  // 从 presence 恢复 streaming 态（决定发送键是"发送"还是"停止"）
  const pInfo = presence?.sessions?.find(x => x.id === sid);
  updateStreamingState(pInfo?.streaming ?? false);
  $("app").classList.add("show-chat"); // 移动端进入对话；宽屏无副作用
  // 高亮列表
  document.querySelectorAll(".srow").forEach((r) => r.classList.toggle("active", r.dataset.sid === sid));
  await loadHistory(sid);
  // Only backfill the in-progress run — completed runs are already fully rendered
  // by loadHistory (the agent persists the final assistant message). Replaying
  // them would duplicate every text_chunk.
  if (pInfo?.streaming) {
    await backfillActiveRun(sid);
  }
  await loadSessionState(sid); // 填充模型/思考等级选择器 + 显示重命名按钮
}

// P1c：若该会话正有一轮在进行，回放其缓冲事件（从 idx 0），补齐中途加入丢掉的前缀。
// 事件带的 runId/idx 与实时事件一致，seenEvents 去重，实时流接着往下走。
async function backfillActiveRun(sid) {
  try {
    const r = await request({ type: "get_events_since", sessionId: sid, sinceIdx: -1 }, sid);
    const events = r?.data?.events || [];
    if (!events.length) return;
    if (r?.data?.truncated) line("⚠ 本轮开头部分超出缓冲已丢弃（仅显示可回放部分）", "err");
    const subj = `p.${pair}.evt.${sid}`;
    for (const ev of events) onEvent(ev, subj);
  } catch { /* 无进行中轮次 / 老版 Bridge 不支持：忽略 */ }
}

// 从 Bridge 拉该会话的持久化消息（get_messages，LLM Message 形状）并按气泡渲染。
// content 可能是字符串，也可能是 content blocks 数组（[{type:"text",text:…},…]）；
// tool 角色消息和纯工具调用的 assistant 消息（无文本）在聊天视图里跳过。
// 返回已加载消息中最大的 runId（供 backfillActiveRun 判断是否已包含当前轮）。
function messageText(content) {
  if (typeof content === "string") return content;
  if (Array.isArray(content)) {
    return content.filter(b => b && b.type === "text").map(b => b.text || "").join("");
  }
  return "";
}

async function loadHistory(sid) {
  try {
    const r = await request({ type: "get_messages", sessionId: sid }, sid);
    const msgs = r?.data?.messages || [];
    if (!msgs.length) { line("（无历史消息）"); return null; }
    let shown = 0;
    let maxRunId = null;
    for (const m of msgs) {
      const text = messageText(m.content);
      if (!text.trim()) continue;
      if (m.run_id) maxRunId = m.run_id;
      if (m.role === "user") { renderUser(text); shown++; }
      else if (m.role === "assistant") { renderAssistantStatic(text); shown++; }
    }
    if (!shown) line("（无可显示的历史消息）");
    return maxRunId;
  } catch (e) { line("加载历史失败: " + (e?.message || e), "err"); return null; }
}

// ── 模型 / 思考等级 / 重命名 ──────────────────────────────────────────────

// 连接时拉一次可用模型列表，缓存到 availableModels。
async function loadModels() {
  try {
    const r = await request({ type: "list_models" }, "list");
    availableModels = r?.data?.models || [];
  } catch { /* 模型列表拉取失败不阻塞主流程 */ }
}

// 拉取当前会话状态（model / thinkingLevel），填充选择器并显示重命名按钮。
async function loadSessionState(sid) {
  try {
    const r = await request({ type: "get_state", sessionId: sid }, sid);
    const state = r?.data || {};
    populateModelSelect(state.model);
    populateThinkingSelect(state.thinkingLevel);
    $("modelSelect").style.display = "";
    $("thinkingSelect").style.display = "";
    $("renameBtn").style.display = "";
  } catch { /* 状态拉取失败：隐藏选择器 */ }
}

function populateModelSelect(currentModel) {
  const sel = $("modelSelect");
  sel.innerHTML = "";
  for (const m of availableModels) {
    const opt = document.createElement("option");
    opt.value = m.id;
    opt.textContent = (m.provider ? m.provider + "/" : "") + (m.label || m.id);
    if (m.id === currentModel || (m.provider && (m.provider + "/" + m.id) === currentModel)) opt.selected = true;
    sel.appendChild(opt);
  }
  // 当前模型不在列表时（可能已下线），插入占位项保持显示
  if (currentModel && ![...sel.options].some(o => o.selected)) {
    const opt = document.createElement("option");
    opt.value = currentModel; opt.textContent = currentModel; opt.selected = true;
    sel.prepend(opt);
  }
}

function populateThinkingSelect(currentLevel) {
  const sel = $("thinkingSelect");
  const levels = ["off", "low", "medium", "high"];
  sel.innerHTML = "";
  for (const lv of levels) {
    const opt = document.createElement("option");
    opt.value = lv; opt.textContent = lv;
    if (lv === (currentLevel || "off")) opt.selected = true;
    sel.appendChild(opt);
  }
}

async function onModelChange() {
  const modelId = $("modelSelect").value;
  if (modelId) localStorage.setItem("remote.lastModelId", modelId);
  if (!modelId || !session) return;
  try { await request({ type: "set_model", sessionId: session, modelId }, session); }
  catch (e) { line("切换模型失败: " + (e?.message || e), "err"); }
}

async function onThinkingChange() {
  const level = $("thinkingSelect").value;
  if (level) localStorage.setItem("remote.lastThinkingLevel", level);
  if (!session) return;
  try { await request({ type: "set_thinking_level", sessionId: session, level }, session); }
  catch (e) { line("切换思考等级失败: " + (e?.message || e), "err"); }
}

async function onRename() {
  const current = $("chatTitle").textContent;
  const name = prompt("重命名会话", current);
  if (!name?.trim() || !session) return;
  try {
    await request({ type: "set_session_name", sessionId: session, name: name.trim() }, session);
    // 更新本地标题 + 列表
    const s = sessions.find(x => x.sessionId === session);
    if (s) s.title = name.trim();
    $("chatTitle").textContent = name.trim();
    renderSessionList();
  } catch (e) { line("重命名失败: " + (e?.message || e), "err"); }
}

function ensureSession() { return session; }

async function send() {
  // 对齐 GUI：streaming 时禁止新的 plain prompt（GUI 弹 alreadyRunning toast）。
  // 要插话用"停止"键先中断；steer/follow_up 桌面端不用，web 也不暴露。
  if (isStreaming) { line("正在回复中，请先停止或等待结束", "badge"); return; }
  const text = $("msg").value.trim(); if (!text) return;
  const wasNew = !session;        // 懒创建首条：当前还没有 DB 条目
  $("msg").value = "";
  renderUser(text); // 立即显示本端发的 prompt
  bubble = null; thinkEl = null; toolChips.clear();
  // 草稿的模型/思考等级随首条 prompt 一起发，bridge 在新建 session 时 seed 它们。
  const modelId = $("modelSelect")?.value || "";
  const level = $("thinkingSelect")?.value || "";
  let ack;
  try {
    ack = await request({ type: "prompt", sessionId: session, message: text, modelId, level });
  } catch (e) { line("发送失败: " + e.message, "err"); return; }
  // 懒创建首条：bridge 刚建好 thread + 真实 agent session，ack 回传真实 id。
  // 把本地 session 切到真实 id，刷新列表/标题，否则后续事件/历史会对不上。
  const sid = ack?.data?.sessionId;
  if (sid && sid !== session) {
    session = sid;
    await listSessions();
    const entry = sessions.find(s => s.sessionId === sid);
    if (entry?.title) $("chatTitle").textContent = entry.title;
    document.querySelectorAll(".srow").forEach(r => r.classList.toggle("active", r.dataset.sid === sid));
    $("renameBtn").style.display = "";   // 有真 session 了，可重命名
  }
  // ack 回来前 session 还是占位，onEvent 按 subject 过滤丢掉了早期事件，补齐当前 run。
  if (wasNew && sid) await backfillActiveRun(sid);
}

async function abort() {
  if (!ensureSession()) return;
  try { await request({ type: "abort", sessionId: session }); line("已请求中断"); }
  catch (e) { line("中断失败: " + e.message, "err"); }
}

function assistantBubble() {
  if (!bubble) {
    bubble = document.createElement("div"); bubble.className = "bubble";
    bubble.innerHTML = `<div class="role">assistant</div>`;
    const span = document.createElement("span"); bubble.appendChild(span); bubble._span = span;
    log(bubble);
  }
  return bubble;
}

function renderUser(text) {
  const u = document.createElement("div"); u.className = "bubble user";
  u.innerHTML = `<div class="role">你</div>`; u.appendChild(document.createTextNode(text)); log(u);
}

// 历史里的助手消息：一次性整段渲染（非流式）。
function renderAssistantStatic(text) {
  const b = document.createElement("div"); b.className = "bubble";
  b.innerHTML = `<div class="role">assistant</div>`;
  const span = document.createElement("span"); span.textContent = text; b.appendChild(span);
  log(b);
}

function onEvent(ev, subject) {
  const sess = subject ? subject.split(".").slice(3).join(".") : "";
  // 只处理当前选中会话的事件（过滤跨会话，避免堆积）
  if (sess && sess !== session) return;
  if (ev.type === "ping") return;
  // 新一轮：换新气泡（历史保留，不清屏），旧轮内容留在上方形成对话流。
  if (ev.runId && ev.runId !== curRun) {
    curRun = ev.runId; bubble = null; thinkEl = null; toolChips.clear();
  }
  // P1: 按 (runId,idx) 去重（乱序/重连重放都安全）
  if (ev.runId) {
    const key = ev.runId + ":" + ev.idx;
    if (seenEvents.has(key)) return;
    seenEvents.add(key);
  }
  const data = (() => { try { return JSON.parse(ev.data); } catch { return {}; } })();
  const verbose = $("verbose")?.checked;
  switch (ev.type) {
    case "ping": break;
    case "agent_start": updateStreamingState(true); if (verbose) line("▶ agent_start"); break;
    // 助手文本：始终显示（这是主内容）。
    case "text_chunk": { const b = assistantBubble(); b._span.textContent += (data.text || ""); break; }
    case "thinking_start": break;
    case "thinking_delta": {
      if (!verbose) break;
      if (!thinkEl) { thinkEl = document.createElement("div"); thinkEl.className = "think"; log(thinkEl); }
      thinkEl.textContent += (data.text || ""); break;
    }
    case "thinking_end": break;
    case "tool_start": {
      if (!verbose) break;
      const chip = document.createElement("span"); chip.className = "chip"; chip.textContent = "🔧 " + (data.tool_name || "tool");
      toolChips.set(data.tool_id, chip); const wrap = document.createElement("div"); wrap.appendChild(chip); log(wrap); break;
    }
    case "tool_end": { if (!verbose) break; const chip = toolChips.get(data.tool_id); if (chip) chip.className = "chip done"; break; }
    // 审批 / 错误：始终显示（需要操作/知情）。
    case "approval_request": renderApproval(data); break;
    case "error": line("✖ error: " + (data.error || ev.data), "err bubble"); break;
    case "agent_end": updateStreamingState(false); refreshSessionTitle(); if (verbose) line(data.error ? ("■ agent_end (error)") : "■ agent_end"); break;
    default: if (verbose) line("· " + ev.type);
  }
}

function renderApproval(data) {
  const box = document.createElement("div"); box.className = "approval";
  box.innerHTML = `<div class="role">需要审批：${data.tool_name || ""} (${data.risk_level || ""})</div>
    <div>${data.title || ""} — ${data.summary || ""}</div>`;
  const approve = document.createElement("button"); approve.textContent = "批准";
  const reject = document.createElement("button"); reject.textContent = "拒绝"; reject.className = "ghost";
  const decide = async (mode) => {
    await request({ type: "approval_decision", sessionId: session, entryId: data.approval_request_id, mode });
    box.querySelectorAll("button").forEach(b => b.disabled = true);
    box.appendChild(document.createTextNode("  → " + mode));
  };
  approve.onclick = () => decide("approved"); reject.onclick = () => decide("rejected");
  const row = document.createElement("div"); row.style.marginTop = "8px"; row.append(approve, reject); box.appendChild(row);
  // 对齐 GUI 审批快捷键：Cmd/Ctrl+Enter=批准，Esc=拒绝。
  box.tabIndex = 0;
  box.addEventListener("keydown", (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === "Enter") { e.preventDefault(); approve.click(); }
    else if (e.key === "Escape") { e.preventDefault(); reject.click(); }
  });
  log(box);
  box.focus();
}

// 自适应高度的输入框
function autoGrow() { const t = $("msg"); t.style.height = "auto"; t.style.height = Math.min(t.scrollHeight, 140) + "px"; }

$("connect").onclick = doConnect;
$("newsess").onclick = newSession;
$("refresh").onclick = listSessions;
$("send").onclick = send;
$("back").onclick = () => $("app").classList.remove("show-chat");
$("modelSelect").onchange = onModelChange;
$("thinkingSelect").onchange = onThinkingChange;
$("renameBtn").onclick = onRename;
$("msg").addEventListener("input", autoGrow);
// 对齐 GUI：streaming 时 Cmd/Ctrl+Enter 不发送（GUI 此时 early-return）；停止靠点"停止"键。
$("msg").addEventListener("keydown", (e) => { if ((e.metaKey || e.ctrlKey) && e.key === "Enter" && !isStreaming) send(); });
</script>
